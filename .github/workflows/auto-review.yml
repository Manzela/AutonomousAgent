# Auto-review — request a Copilot code review on every PR.
#
# Closes audit item #25 ("Two-stage review on delegated work — the
# subagent-driven-development skill encodes this"). The first stage is
# the automated reviewer wired here; the second stage is the human
# reviewer that the PR template / branch protection prompts for.
#
# If the repository (or the targeted PR author's account) is not on a
# Copilot plan that exposes the bot reviewer, GitHub returns HTTP 422
# from POST /pulls/{n}/requested_reviewers. We swallow that case and
# leave a soft warning comment on the PR rather than failing CI — the
# human-reviewer path still works.

name: Auto-review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write  # required to request reviewers + post fallback comment

concurrency:
  group: auto-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  request-copilot:
    name: Request Copilot review
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event.pull_request.draft == false
    steps:
      - name: Request Copilot reviewer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail

          # POST /repos/{owner}/{repo}/pulls/{pull_number}/requested_reviewers
          # with reviewers=["github-copilot[bot]"]. The bot login is how the
          # API addresses the Copilot reviewer (see
          # docs.github.com/en/rest/pulls/review-requests).
          set +e
          response="$(gh api \
            -X POST \
            "/repos/${REPO}/pulls/${PR_NUMBER}/requested_reviewers" \
            -f 'reviewers[]=github-copilot[bot]' 2>&1)"
          exit_code=$?
          set -e

          if [ "${exit_code}" -eq 0 ]; then
            echo "::notice::Copilot review requested for PR #${PR_NUMBER}"
            exit 0
          fi

          # Parse the failure mode. The two we expect:
          #   - HTTP 422 — Copilot subscription is not enabled / bot reviewer
          #     not available on this account. Soft-skip with a PR comment.
          #   - HTTP 403 — fine-grained PAT or org policy is blocking the
          #     request. Common on forked-PR runs; soft-skip silently.
          # Anything else is a real failure; surface it.
          if printf '%s' "${response}" | grep -qE 'HTTP 422|Unprocessable|Could not resolve'; then
            echo "::warning::Copilot reviewer unavailable (HTTP 422). Posting fallback comment."
            gh pr comment "${PR_NUMBER}" --repo "${REPO}" \
              --body "Auto-review skipped — GitHub Copilot code review is not enabled on this repository (or on the PR author's account). The human-reviewer path remains in effect; assign a reviewer manually before merge. To enable: GitHub Settings -> Copilot -> enable code review, then re-run the auto-review workflow on this PR." \
              || true
            exit 0
          fi

          if printf '%s' "${response}" | grep -qE 'HTTP 403|Resource not accessible'; then
            echo "::warning::GITHUB_TOKEN cannot request the Copilot reviewer (HTTP 403). Expected on forked PRs."
            exit 0
          fi

          # Unknown failure — fail the workflow so the human sees it.
          echo "::error::gh api failed with exit ${exit_code}:"
          printf '%s\n' "${response}"
          exit "${exit_code}"
