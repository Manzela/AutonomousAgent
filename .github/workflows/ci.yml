# Continuous Integration — runs on every PR and on push to main.
#
# Jobs are designed to be cheap, fast, and informative. They run in parallel
# where possible and fail loudly with actionable error messages.
#
# Matrix (kept minimal to conserve Actions minutes across the account):
#   - lint-python        (ruff + ruff-format)         — Python style + format
#   - lint-shell         (shellcheck)                 — Bash strict-mode + quoting
#   - lint-yaml          (yamllint)                   — YAML well-formedness
#   - lint-dockerfile    (hadolint)                   — Dockerfile best practices
#   - enforce-sha-pinning (check-sha-pinning.sh)      — Workflow supply-chain hygiene
#   - unit-tests         (pytest)                     — Unit test suite
#   - validate-config    (limits_validator)           — limits.yaml schema validity
#   - validate-compose   (docker compose config)      — Compose render check
#
# Each job is independent and can be re-run individually from the GitHub UI.
# Markdown lint, CodeQL, and Dependency Review were removed — the first was
# advisory-only, the latter two require GitHub Advanced Security on private
# repos to be useful and cost compute on every PR.

name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  # Note: no `push: main` trigger. PRs are the only path to main (branch
  # protection enforces it), and CI already ran on the PR before merge.
  # Re-running on the resulting merge commit duplicates compute for no signal.

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Python lint: ruff (linter) + ruff-format (formatter check)
  # ------------------------------------------------------------------
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up uv (fast Python installer)
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Install ruff
        # Pinned to match .pre-commit-config.yaml (astral-sh/ruff-pre-commit
        # rev v0.6.9). Bumping requires updating both in lockstep — format
        # heuristics change across ruff minor versions.
        run: uv tool install ruff@0.6.9

      - name: Skip if no Python files
        id: detect
        run: |
          if find . -name "*.py" -not -path "./.venv/*" -not -path "./hermes-agent/*" -not -path "./.worktrees/*" | grep -q .; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Python files at this revision; skipping lint."
          fi

      - name: Run ruff check
        if: steps.detect.outputs.has_python == 'true'
        run: ruff check . --exclude hermes-agent --exclude .worktrees --output-format=github

      - name: Run ruff format check
        if: steps.detect.outputs.has_python == 'true'
        run: ruff format --check . --exclude hermes-agent --exclude .worktrees

  # ------------------------------------------------------------------
  # Shell lint: shellcheck on every executable bash script
  # ------------------------------------------------------------------
  lint-shell:
    name: Lint Shell
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Skip if no shell scripts
        id: detect
        run: |
          if find scripts -name "*.sh" 2>/dev/null | grep -q .; then
            echo "has_shell=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_shell=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No shell scripts at this revision; skipping shellcheck."
          fi

      - name: Run shellcheck
        if: steps.detect.outputs.has_shell == 'true'
        run: |
          # Ignore SC1091 (sourced file) since secrets/.env paths are dynamic.
          shellcheck --severity=warning --exclude=SC1091 scripts/*.sh

  # ------------------------------------------------------------------
  # YAML lint
  # ------------------------------------------------------------------
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Install yamllint
        run: pipx install yamllint

      - name: Run yamllint
        run: |
          # Skip Hermes upstream submodule and worktrees (not our concern)
          yamllint -c .yamllint.yml \
            $(find . -type f \( -name "*.yml" -o -name "*.yaml" \) \
              -not -path "./.git/*" \
              -not -path "./hermes-agent/*" \
              -not -path "./.worktrees/*" \
              -not -path "./.venv/*" \
              2>/dev/null) || true
          # Re-run failing-mode for files that should pass strictly
          if [ -d deploy ]; then
            yamllint -c .yamllint.yml deploy/
          fi

  # ------------------------------------------------------------------
  # Dockerfile lint with hadolint
  # ------------------------------------------------------------------
  lint-dockerfile:
    name: Lint Dockerfiles
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Skip if no Dockerfiles
        id: detect
        run: |
          if find deploy -name "Dockerfile*" 2>/dev/null | grep -q .; then
            echo "has_dockerfiles=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfiles=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No Dockerfiles at this revision; skipping hadolint."
          fi

      - name: Run hadolint on Dockerfile.hermes
        if: steps.detect.outputs.has_dockerfiles == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: deploy/Dockerfile.hermes
          ignore: DL3008,DL3009,DL3015  # apt pinning, layer caching warnings — noisy
        continue-on-error: true  # advisory until we baseline

      - name: Run hadolint on Dockerfile.shell-sandbox
        if: steps.detect.outputs.has_dockerfiles == 'true'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: deploy/sandboxes/Dockerfile.shell-sandbox
          ignore: DL3008,DL3009,DL3015
        continue-on-error: true

  # ------------------------------------------------------------------
  # Enforce SHA-pinning on every third-party Action used by workflows.
  # Companion to the
  # repo-level `allowed_actions=selected` policy described in
  # docs/runbooks/allowed-actions-restriction.md — that policy gates
  # *which* actions may run; this check gates *how* they are
  # referenced. Both layers exist because a tag-pinned action drawn
  # from the patterns_allowed list still satisfies the API-side
  # selected-actions filter but undermines supply-chain immutability.
  #
  # Rationale (industry standards):
  #   - OpenSSF Scorecard "pinned-dependencies" check
  #   - OWASP CICD-SEC-05 (Insufficient Pipeline-Based Access Controls)
  #   - SLSA L2 (Build Provenance — pinning is a prerequisite)
  #
  # Pure-bash, no third-party tool dependency. Runs in seconds.
  # ------------------------------------------------------------------
  enforce-sha-pinning:
    name: Enforce Action SHA-pinning
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false  # Hermes submodule not relevant for workflow lint

      - name: Run scripts/check-sha-pinning.sh
        # Default policy: every uses: reference (including github-owned)
        # must SHA-pin. Set ALLOW_GITHUB_OWNED_TAGS=1 to relax this for
        # actions/* and github/* refs — see script header for rationale.
        run: bash scripts/check-sha-pinning.sh

  # ------------------------------------------------------------------
  # Unit tests via pytest
  # ------------------------------------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false  # skip Hermes submodule for unit tests; it's not needed

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Skip if no test suite
        id: detect
        run: |
          if [ -f pyproject.toml ] && [ -d tests/unit ]; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::notice::pyproject.toml or tests/unit/ missing at this revision; skipping unit tests."
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_tests == 'true'
        run: uv venv .venv --python 3.11

      - name: Install dev dependencies
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          source .venv/bin/activate
          uv sync --frozen --extra dev --extra gcp --extra a2a

      - name: Run pytest
        if: steps.detect.outputs.has_tests == 'true'
        run: |
          source .venv/bin/activate
          pytest tests/unit/ -v --tb=short --junitxml=junit.xml

      - name: Upload test results
        if: always() && steps.detect.outputs.has_tests == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: junit-results
          path: junit.xml
          retention-days: 14

  # ------------------------------------------------------------------
  # Assert no plaintext secrets on disk
  # ------------------------------------------------------------------
  secrets-lint:
    name: Secrets Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Assert no plaintext secrets on disk
        run: |
          count=$(find secrets/ -type f ! -name '*.sops' ! -name 'README.md' ! -name '.gitignore' | wc -l)
          if [ "$count" -gt 0 ]; then
            find secrets/ -type f ! -name '*.sops' ! -name 'README.md' ! -name '.gitignore'
            echo "ERROR: $count plaintext secret file(s) found"
            exit 1
          fi

  # ------------------------------------------------------------------
  # Type check (mypy)
  # ------------------------------------------------------------------
  type-check:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: recursive

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Install dependencies + mypy
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv sync --frozen --extra dev --extra gcp --extra a2a
          uv pip install "mypy>=1.10"

      - name: Run mypy
        # T-1 fix: mypy is now blocking (required-for-merge). Type errors
        # must be resolved before merge. Remove continue-on-error and || true
        # so the CI step fails on any mypy finding.
        run: |
          source .venv/bin/activate
          mypy lib/ app/ \
            --ignore-missing-imports \
            --exclude 'tests/' \
            --no-error-summary

  # ------------------------------------------------------------------
  # Validate config/limits.yaml against its JSON schema
  # ------------------------------------------------------------------
  validate-config:
    name: Validate config/limits.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7

      - name: Skip if no limits.yaml
        id: detect
        run: |
          if [ -f config/limits.yaml ] && [ -f config/limits-schema.json ] && [ -f lib/limits_validator.py ]; then
            echo "has_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_config=false" >> "$GITHUB_OUTPUT"
            echo "::notice::config/limits.yaml or schema or validator missing; skipping."
          fi

      - name: Set up Python and install validator deps
        if: steps.detect.outputs.has_config == 'true'
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install pyyaml jsonschema

      - name: Validate limits.yaml
        if: steps.detect.outputs.has_config == 'true'
        run: |
          source .venv/bin/activate
          python -m lib.limits_validator config/limits.yaml

  # ------------------------------------------------------------------
  # Validate docker-compose YAML renders cleanly
  # ------------------------------------------------------------------
  validate-compose:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Skip if no compose files
        id: detect
        run: |
          if [ -f deploy/docker-compose.yml ]; then
            echo "has_compose=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_compose=false" >> "$GITHUB_OUTPUT"
            echo "::notice::deploy/docker-compose.yml missing; skipping compose validation."
          fi

      - name: Stub secrets and env vars (so eager loading succeeds)
        if: steps.detect.outputs.has_compose == 'true'
        run: |
          mkdir -p secrets
          # env_file is loaded eagerly by compose at parse time
          touch secrets/telegram.env
          touch secrets/chroma-cloud.env
          touch secrets/hermes-provider.env
          touch secrets/honcho.env
          touch secrets/litellm-db.env
          # secrets: blocks are lazy, but the files must exist for `config` to validate paths
          touch secrets/honcho-db-password
          touch secrets/litellm-master-key
          touch secrets/chroma-token
          touch secrets/github-pat
          # Stub HOME-mounted gcloud creds path
          mkdir -p ~/.config/gcloud

      - name: Render production stack
        if: steps.detect.outputs.has_compose == 'true'
        run: docker compose -f deploy/docker-compose.yml config > /dev/null

      - name: Render dev override
        if: steps.detect.outputs.has_compose == 'true' && hashFiles('deploy/docker-compose.dev.yml') != ''
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.dev.yml config > /dev/null

      - name: Render test override
        if: steps.detect.outputs.has_compose == 'true' && hashFiles('deploy/docker-compose.test.yml') != ''
        run: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.test.yml config > /dev/null

  # ------------------------------------------------------------------
  # Snapshot integrity — write→crash→rehydrate contract between
  # lib/durability/checkpoint.py (writer) and lib/durability/resume.py
  # (reader). Runs as a dedicated step so the matrix entry is grep-able
  # in branch-protection rules.
  # Pure-Python — no stack dependency, runs on every PR.
  # ------------------------------------------------------------------
  snapshot-integrity:
    name: Snapshot integrity
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false  # Hermes submodule not needed for this test

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Skip if no snapshot integrity test
        id: detect
        run: |
          if [ -f pyproject.toml ] && [ -f tests/integration/test_snapshot_integrity.py ]; then
            echo "has_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/test_snapshot_integrity.py missing; skipping."
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_test == 'true'
        run: uv venv .venv --python 3.11

      - name: Install dev dependencies
        if: steps.detect.outputs.has_test == 'true'
        run: |
          source .venv/bin/activate
          uv sync --frozen --extra dev --extra gcp --extra a2a

      - name: Run snapshot integrity test
        if: steps.detect.outputs.has_test == 'true'
        run: |
          source .venv/bin/activate
          pytest tests/integration/test_snapshot_integrity.py -v --tb=short --junitxml=snapshot-junit.xml

      - name: Upload test results
        if: always() && steps.detect.outputs.has_test == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: snapshot-integrity-junit
          path: snapshot-junit.xml
          retention-days: 14

  # ------------------------------------------------------------------
  # Phoenix span coverage — short Hermes turn through the observability
  # plugin's register() hook surface, asserting both LLM (model.call)
  # and TOOL (tool.dispatch) spans emit with the OpenInference attribute
  # set Phoenix needs to render its panels.
  # Pure-Python; OTel SDK installed explicitly because dev deps don't
  # carry it (only the production container does).
  # ------------------------------------------------------------------
  phoenix-span-coverage:
    name: Phoenix span coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Skip if no phoenix span coverage test
        id: detect
        run: |
          if [ -f pyproject.toml ] && [ -f tests/integration/test_phoenix_span_coverage.py ]; then
            echo "has_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/test_phoenix_span_coverage.py missing; skipping."
          fi

      - name: Set up Python
        if: steps.detect.outputs.has_test == 'true'
        run: uv venv .venv --python 3.11

      - name: Install dev + OTel SDK
        if: steps.detect.outputs.has_test == 'true'
        run: |
          source .venv/bin/activate
          uv sync --frozen --extra dev --extra gcp --extra a2a
          uv pip install \
            "opentelemetry-api>=1.27" \
            "opentelemetry-sdk>=1.27"

      - name: Run phoenix span coverage test
        if: steps.detect.outputs.has_test == 'true'
        run: |
          source .venv/bin/activate
          pytest tests/integration/test_phoenix_span_coverage.py -v --tb=short --junitxml=phoenix-spans-junit.xml

      - name: Upload test results
        if: always() && steps.detect.outputs.has_test == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: phoenix-span-coverage-junit
          path: phoenix-spans-junit.xml
          retention-days: 14

  # ------------------------------------------------------------------
  # SOUL.md integrity — config/hermes/SOUL.md is mounted read-only into
  # the hermes container and defines the agent's honesty/calibration
  # persona. A silent edit changes production behavior. This job recomputes
  # the file's sha256 and compares it to the pin in config/limits.yaml
  # (integrity.soul_md_sha256). Drift = hard fail. Dedicated job so the
  # `soul-md-integrity` name is grep-able from branch-protection rules.
  #
  # Pure POSIX shell — no Python deps, no actions beyond checkout.
  # ------------------------------------------------------------------
  soul-md-integrity:
    name: SOUL.md integrity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false  # SOUL.md lives in this repo, not the submodule

      - name: Skip if SOUL.md or limits.yaml missing
        id: detect
        run: |
          if [ -f config/hermes/SOUL.md ] && [ -f config/limits.yaml ]; then
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            echo "::notice::config/hermes/SOUL.md or config/limits.yaml missing; skipping."
          fi

      - name: Verify SOUL.md sha256 matches pin
        if: steps.detect.outputs.has_files == 'true'
        run: |
          set -euo pipefail
          # ubuntu-latest runners ship python3 + pyyaml; no install needed.
          pinned="$(python3 -c '
          import sys, yaml
          with open("config/limits.yaml") as f:
              cfg = yaml.safe_load(f)
          try:
              print(cfg["integrity"]["soul_md_sha256"])
          except KeyError:
              sys.stderr.write(
                  "config/limits.yaml is missing integrity.soul_md_sha256 — "
                  "the SOUL.md pin was removed or never installed.\n"
              )
              sys.exit(2)
          ')"
          # `shasum -a 256` works on macOS and Linux; `sha256sum` is
          # Linux-only. Keep the same tool everywhere (YAML comment,
          # update script, CI) so contributors don't get conflicting
          # remediation snippets — see CONTRIBUTING.md "Updating pinned
          # hashes (SOUL.md)".
          actual="$(shasum -a 256 config/hermes/SOUL.md | awk '{print $1}')"
          echo "pinned: ${pinned}"
          echo "actual: ${actual}"
          if [ "${pinned}" != "${actual}" ]; then
            msg="SOUL.md sha256 drift detected. pinned=${pinned} actual=${actual}."
            msg="${msg} If you intentionally changed SOUL.md, run"
            msg="${msg} ./scripts/update_soul_pin.sh and commit the resulting"
            msg="${msg} config/limits.yaml diff in the SAME commit as your"
            msg="${msg} SOUL.md edit (see CONTRIBUTING.md)."
            echo "::error file=config/hermes/SOUL.md::${msg}"
            exit 1
          fi
          echo "::notice::SOUL.md sha256 matches pin (${actual})."

  # ------------------------------------------------------------------
  # Hermes plugin-loader docker-compose smoke test (P2 #23 closure).
  # Spins up the real hermes container via docker compose and asserts
  # disk-cleanup loads via the production PluginManager — not via the
  # importlib shim that tests/integration/test_plugin_loading.py uses
  # for the allowlist + manifest checks. Closes the gap noted in PR #91:
  # importlib-based tests cannot catch loader-side regressions (allowlist
  # drift, manifest kind/key typos, register() raising at runtime).
  # Submodules: true so /app/plugins/disk-cleanup is present in the
  # build context (bundled by hermes-agent submodule).
  # ------------------------------------------------------------------
  plugin-loader-smoke:
    name: Plugin loader smoke (docker compose)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Single source of truth for the compose project name. Pytest fixture,
    # log-capture step, and the always-on teardown all read this exact env
    # var (docker compose's canonical one). Parametrising at the job level
    # eliminates the class of bug where one step talks to project `deploy`
    # (the default) while another talks to `hermes-plugin-loader-smoke-N`.
    # ``github.run_id`` + ``github.run_attempt`` make the name unique per
    # CI run so re-attempts on the same runner cannot collide.
    env:
      COMPOSE_PROJECT_NAME: hermes-plugin-loader-smoke-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: true  # need hermes-agent for /app/plugins/disk-cleanup

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.5.x"

      - name: Skip if no smoke test file
        id: detect
        run: |
          if [ -f pyproject.toml ] && [ -f tests/integration/test_hermes_plugin_loader_smoke.py ]; then
            echo "has_test=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_test=false" >> "$GITHUB_OUTPUT"
            echo "::notice::tests/integration/test_hermes_plugin_loader_smoke.py missing; skipping."
          fi

      - name: Stub secret files so compose-render + container env-loading succeed
        if: steps.detect.outputs.has_test == 'true'
        # No actual secrets are written; we create empty files only so
        # `docker compose config` and `env_file:` references resolve.
        run: |  # pragma: allowlist secret
          mkdir -p secrets
          # env_file is loaded eagerly by compose at container start
          touch secrets/telegram.env secrets/chroma-cloud.env \
                secrets/hermes-provider.env secrets/honcho.env \
                secrets/litellm-db.env
          # `secrets:` blocks need the file to exist for `config` to validate
          touch secrets/litellm-master-key secrets/github-pat
          # gcloud ADC mount (snapshot-watchdog reads this; harmless when empty)
          mkdir -p ~/.config/gcloud

      - name: Set up Python
        if: steps.detect.outputs.has_test == 'true'
        run: uv venv .venv --python 3.11

      - name: Install dev dependencies
        if: steps.detect.outputs.has_test == 'true'
        run: |
          source .venv/bin/activate
          uv sync --frozen --extra dev --extra gcp --extra a2a

      - name: Run plugin-loader smoke test
        if: steps.detect.outputs.has_test == 'true'
        # The test fixture handles docker compose up/--force-recreate/--wait
        # internally; we just invoke pytest. -m runs both the `integration`
        # and `docker` marked tests in this file. The CI runner ships
        # docker by default; the @pytest.mark.skipif gate handles offline
        # development hosts. `COMPOSE_PROJECT_NAME` (set at job level) is
        # picked up by the fixture's `_compose_project_name()` helper.
        run: |
          source .venv/bin/activate
          pytest tests/integration/test_hermes_plugin_loader_smoke.py \
            -v --tb=short --junitxml=plugin-loader-junit.xml

      - name: Capture hermes logs on failure
        if: failure() && steps.detect.outputs.has_test == 'true'
        # Reads the same `-p $COMPOSE_PROJECT_NAME` the fixture used to
        # bring the stack up. Without parameterising both sides the log
        # capture would talk to the default project (`deploy`) and produce
        # an empty log file. `|| true` so a missing project doesn't fail
        # the always-on log-upload step below.
        run: |
          docker compose -f deploy/docker-compose.yml -p "$COMPOSE_PROJECT_NAME" \
            logs --no-color hermes > hermes-failure-logs.txt 2>&1 || true

      - name: Tear down hermes stack
        # `if: always()` is critical here: cancellation (e.g. workflow
        # cancellation, runner shutdown) and pytest timeouts both bypass
        # the fixture's `finally` block, so the only place we are
        # guaranteed to clean up is in the workflow itself. Without this
        # step a cancelled run leaves the container + named volumes alive
        # on self-hosted runners and shrinks the disk every CI cycle.
        if: always() && steps.detect.outputs.has_test == 'true'
        run: |
          docker compose -f deploy/docker-compose.yml -p "$COMPOSE_PROJECT_NAME" \
            down -v --remove-orphans || true

      - name: Upload test results
        if: always() && steps.detect.outputs.has_test == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: plugin-loader-smoke-junit
          path: |
            plugin-loader-junit.xml
            hermes-failure-logs.txt
          retention-days: 14
          if-no-files-found: ignore
