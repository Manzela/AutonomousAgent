# CodeQL — static analysis for Python (NIST SSDF PW.7).
#
# Runs on every PR to main plus a weekly schedule to catch new query packs
# released since the last PR. Detection-only — findings land in the
# repository's Security tab (Code Scanning > CodeQL) so the team can
# triage on their own schedule rather than blocking merges on pre-existing
# advisories.
#
# Languages: python only. JavaScript is intentionally omitted because the
# repo contains zero JS at the time of writing; bring it back when a
# frontend lands. Adding unused languages costs ~3min/run for no signal.

name: CodeQL

on:
  pull_request:
    branches: [main]
    # Research artefacts under docs/research/ are reference scaffolding
    # (per docs/research/autonomous-agent-seed-orchestrator/README.md: must
    # be ported into lib/ + tests before becoming production). They are
    # not part of the runtime attack surface and CodeQL will scan them
    # when they are promoted out of docs/research/. Negation pattern is
    # used here in `paths` (not paths-ignore) so the trigger filter is
    # unambiguous: workflow runs iff a non-research .py file or this
    # workflow / its config changed. The codeql-config.yml's own
    # paths-ignore handles the analysis step (which files get scanned)
    # for any run that does fire.
    paths:
      - '**/*.py'
      - '!docs/research/**'
      - '.github/workflows/codeql.yml'
      - '.github/codeql/codeql-config.yml'
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - '!docs/research/**'
      - '.github/workflows/codeql.yml'
      - '.github/codeql/codeql-config.yml'
  schedule:
    # Weekly Mondays 09:00 UTC — picks up new query pack releases.
    - cron: '17 9 * * 1'
  workflow_dispatch:

# Cancel superseded PR runs.
concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write   # required to upload SARIF results
  actions: read            # required by codeql-action

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: true
      matrix:
        language: [python]

    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          category: "/language:${{ matrix.language }}"

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b654e8a504a  # v1
        with:
          config: >-
            p/python p/security-audit p/owasp-top-ten p/jwt
