# Dependency review — runs on every PR.
# Surfaces newly-introduced vulnerabilities and license issues before merge.

name: Dependency Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Review dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Allow MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Python-2.0
          # Block GPL/AGPL by default (we're MIT-licensed; copyleft inflicts our consumers)
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, MPL-2.0, Python-2.0, BlueOak-1.0.0, CC-BY-4.0, CC0-1.0, Unlicense, 0BSD
          comment-summary-in-pr: true
