name: Lint Cost Tiers

on:
  push:
    paths:
      - 'config/hermes/model-tiers.yaml'
  pull_request:
    paths:
      - 'config/hermes/model-tiers.yaml'

# Minimal permissions — read-only on repo contents.
permissions:
  contents: read

jobs:
  lint-cost-tiers:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Verify daily_cost_cap_usd exists on every active tier
        run: |
          # Pure Python + PyYAML (pre-installed on ubuntu-latest).
          # Avoids `snap install yq` which downloads an unpinned binary with no
          # checksum verification (supply-chain finding LINT-COST-2).
          python3 - <<'PYEOF'
          import sys, yaml
          with open("config/hermes/model-tiers.yaml") as f:
              data = yaml.safe_load(f)
          tiers = data.get("tiers", {})
          missing = [
              k for k, v in tiers.items()
              if v.get("daily_cost_cap_usd") is None
              and v.get("status") != "stub-until-w1j"
          ]
          if missing:
              print(f"::error::Tiers missing daily_cost_cap_usd: {missing}")
              sys.exit(1)
          print(f"All {len(tiers)} tier(s) verified — each active tier has daily_cost_cap_usd.")
          PYEOF
