# Secret scanning — every PR + scheduled weekly sweep.
#
# Two complementary tools:
#   - gitleaks    : signature-based scan of the entire history
#   - detect-secrets: baseline-aware diff scan
#
# Both are advisory by default but FAIL the job on critical findings.

name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "23 6 * * 1"  # Mondays at 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code (full history for full scan)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for history scan

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Free tier — no GITLEAKS_LICENSE required for personal repos
        with:
          config-path: .gitleaks.toml

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Skip if no baseline
        id: detect
        run: |
          if [ -f .secrets.baseline ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "::notice::.secrets.baseline not found; skipping detect-secrets."
          fi

      - name: Audit baseline (fail on new unaudited secrets)
        if: steps.detect.outputs.has_baseline == 'true'
        run: |
          # Re-scan the codebase
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'secrets/.*\.sops$|hermes-agent/.*|uv\.lock|\.worktrees/.*'
          # Verify no new findings vs baseline
          detect-secrets audit --report .secrets.baseline || true
