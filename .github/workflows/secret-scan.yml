# Secret scanning — every PR + scheduled weekly sweep.
#
# Two complementary tools:
#   - gitleaks    : signature-based scan of the entire history
#   - detect-secrets: baseline-aware diff scan
#
# Both are advisory by default but FAIL the job on critical findings.

name: Secret Scan

on:
  pull_request:
  schedule:
    - cron: "23 6 * * 1"  # every Monday at 06:23 UTC
  workflow_dispatch:
  # No `push: main` trigger — PRs already cover this path and CI ran on the
  # PR before merge. Monthly scheduled scan catches anything that drifted.

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code (full history for full scan)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          fetch-depth: 0  # required for history scan

      # We invoke gitleaks directly rather than via the action wrapper because
      # `gitleaks-action@v2` constructs a `before..after` range that breaks on
      # the initial push (where the parent of the first commit doesn't exist).
      # Direct invocation always scans the full source tree at HEAD plus the
      # full history, with our `.gitleaks.toml` allowlist applied.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" \
            -o checksums.txt
          grep "linux_x64.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      - name: Scan working tree (no-git mode, current contents only)
        run: |
          ./gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks-tree.sarif

      - name: Scan full git history
        run: |
          ./gitleaks detect \
            --source . \
            --redact \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks-history.sarif

      - name: Upload SARIF (working tree)
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          sarif_file: gitleaks-tree.sarif
          category: gitleaks-tree
        continue-on-error: true  # SARIF upload requires Code Scanning, advisory-only

      - name: Upload SARIF (history)
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          sarif_file: gitleaks-history.sarif
          category: gitleaks-history
        continue-on-error: true

  detect-secrets:
    name: detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install 'detect-secrets==1.5.0'

      - name: Skip if no baseline
        id: detect
        run: |
          if [ -f .secrets.baseline ]; then
            echo "has_baseline=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_baseline=false" >> "$GITHUB_OUTPUT"
            echo "::notice::.secrets.baseline not found; skipping detect-secrets."
          fi

      - name: Audit baseline (fail on new unaudited secrets)
        if: steps.detect.outputs.has_baseline == 'true'
        run: |
          detect-secrets scan \
            --baseline .secrets.baseline \
            --exclude-files 'secrets/.*\.sops$|hermes-agent/.*|uv\.lock|\.worktrees/.*'
          detect-secrets audit --report .secrets.baseline
