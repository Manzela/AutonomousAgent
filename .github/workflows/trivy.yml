# Trivy — container image vulnerability scan (CIS Docker 4.x / SLSA Build L2).
#
# Builds the Hermes image locally (no registry push) and scans it for
# CRITICAL + HIGH OS-package and library CVEs. Exits non-zero on any
# CRITICAL/HIGH finding so release tags can't ship known-vulnerable
# images.

name: Trivy

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'deploy/Dockerfile.*'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # SARIF upload to Code Scanning

concurrency:
  group: trivy-${{ github.ref }}
  cancel-in-progress: false   # tags are immutable; never cancel

jobs:
  scan:
    name: Scan Hermes image
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: recursive  # hermes-agent submodule is needed for the build

      - name: Install Trivy
        run: |
          TRIVY_VERSION=0.62.1
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o trivy.tar.gz
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_checksums.txt" \
            -o checksums.txt
          grep "Linux-64bit.tar.gz" checksums.txt | sha256sum -c -
          tar -xzf trivy.tar.gz trivy
          chmod +x trivy
          ./trivy version

      - name: Build Hermes image (local, no push)
        run: |
          docker build \
            --file deploy/Dockerfile.hermes \
            --tag autonomousagent/hermes:scan-${{ github.sha }} \
            .

      - name: Run Trivy vulnerability scanner
        run: |
          ./trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 1 \
            --ignore-unfixed \
            --vuln-type os,library \
            autonomousagent/hermes:scan-${{ github.sha }}

      - name: Upload Trivy scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360  # v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'
