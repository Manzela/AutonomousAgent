# Weekly LiteLLM cost summary — posts a GitHub issue with the previous
# 7-day spend aggregated by model + user/api_key. Closes Hermes audit
# item #18 ("Insights / cost telemetry MUST be reviewed weekly if
# running unattended on a paid API").
#
# Industry standards:
#   * FinOps Foundation — weekly cost review for any production cloud
#     workload (https://www.finops.org/framework/capabilities/).
#   * NIST SP 800-53 AU-6 (audit review, analysis and reporting).
#
# Mechanics:
#   * Cron fires every Monday 09:00 UTC (deliberate offset from CI's
#     business-hours window so it doesn't compete for runners).
#   * `scripts/weekly_cost_summary.py` queries LiteLLM (proxy API first,
#     direct Postgres on 404 fallback — same pattern as
#     `lib/durability/budget_watchdog.py` from PR #84) and writes the
#     markdown body + title to `$GITHUB_OUTPUT`.
#   * The body is posted as an issue labelled `cost-report`, assigned to
#     @Manzela, via the built-in `gh` CLI (no third-party action — keeps
#     the workflow inside the `selected_actions` allow-list documented
#     in `docs/runbooks/allowed-actions-restriction.md`).
#
# Secrets (operator-provisioned, see PR body):
#   * LITELLM_PROXY_URL — e.g. https://litellm.example.com
#   * LITELLM_MASTER_KEY — proxy master key (sk-...)
#   * LITELLM_DB_URL — Postgres connection string (DB fallback; optional
#     if the API endpoint is reachable but recommended for resilience).
# Missing secrets → the script renders a "degraded" issue body so the
# operator sees the gap on Monday morning instead of silent loss.

name: Weekly cost summary

on:
  schedule:
    - cron: '0 9 * * 1'  # Monday 09:00 UTC
  workflow_dispatch:
    # Manual trigger for ad-hoc spot-checks and post-incident review.

permissions:
  contents: read
  issues: write   # required to file the cost-report issue

concurrency:
  group: weekly-cost-summary
  cancel-in-progress: false   # never cancel a cost report mid-flight

jobs:
  post-cost-summary:
    name: Build + post weekly cost summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          submodules: false   # script has no Hermes dependency

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: '3.11'

      - name: Install runtime deps
        # httpx for the proxy REST call; psycopg[binary] is the DB
        # fallback. Both are pinned to the same families used by the
        # production sidecar so the report and the watchdog see the
        # same data shape.
        run: |
          python -m pip install --upgrade pip
          pip install 'httpx>=0.27,<1' 'psycopg[binary]>=3.2,<4'

      - name: Build cost summary (writes title + body to $GITHUB_OUTPUT)
        id: report
        env:
          LITELLM_PROXY_URL: ${{ secrets.LITELLM_PROXY_URL }}
          LITELLM_MASTER_KEY: ${{ secrets.LITELLM_MASTER_KEY }}
          LITELLM_DB_URL: ${{ secrets.LITELLM_DB_URL }}
        run: python scripts/weekly_cost_summary.py

      - name: File cost-report issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_TITLE: ${{ steps.report.outputs.title }}
          ISSUE_BODY: ${{ steps.report.outputs.body }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_TITLE:-}" ]; then
            echo "::error::report step did not emit a title — check upstream logs"
            exit 1
          fi
          # Use a HEREDOC for the body so backticks, pipes and table
          # pipes survive verbatim through the gh CLI argument.
          BODY_FILE="$(mktemp)"
          printf '%s\n' "$ISSUE_BODY" > "$BODY_FILE"
          gh issue create \
            --repo "${GITHUB_REPOSITORY}" \
            --title "$ISSUE_TITLE" \
            --body-file "$BODY_FILE" \
            --label "cost-report" \
            --assignee "Manzela"
