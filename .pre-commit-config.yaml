repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^secrets/.*\.sops$
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: detect-private-key
        exclude: ^tests/unit/test_(scrubber(_callback)?|alert_payload_scrubbing)\.py$
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
        exclude: ^tests/unit/test_(scrubber(_callback)?|alert_payload_scrubbing)\.py$
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            secrets/.*\.sops|
            tests/fixtures/.*|
            tests/unit/test_scrubber(_callback)?\.py|
            tests/unit/test_alert_payload_scrubbing\.py|
            uv.lock|
            hermes-agent/.*|
            audit/.*
          )$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: block-plaintext-in-secrets
        name: Block non-.sops files under secrets/
        entry: |
          bash -c '
          set -e
          STAGED=$(git diff --cached --name-only --diff-filter=AM | grep "^secrets/" || true)
          for f in $STAGED; do
            base=$(basename "$f")
            case "$f" in
              secrets/README.md|secrets/.gitignore) continue ;;
              *.sops) continue ;;
              *) echo "BLOCKED: $f is not encrypted (.sops). Run scripts/encrypt_secrets.sh."; exit 1 ;;
            esac
          done
          '
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: block-update-plan-scripts
        name: Block update_plan.py / update_rubric.py / update_brain.py
        entry: |
          bash -c '
          BAD=$(git diff --cached --name-only --diff-filter=A | grep -E "(^|/)update_(plan|rubric|brain|audit_[a-z]+)\.py$" || true)
          if [ -n "$BAD" ]; then
            echo "BLOCKED: forbidden script pattern: $BAD"
            exit 1
          fi
          '
        language: system
        pass_filenames: false
        stages: [pre-commit]
