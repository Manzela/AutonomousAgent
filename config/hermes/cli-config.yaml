# Hermes Agent CLI configuration for Phase 1 local deployment.
# Full reference: hermes-agent/cli-config.yaml.example

model:
  # The Hermes provider plugin we use is `custom` — that's the canonical
  # name in plugins/model-providers/ for "any other OpenAI-compatible
  # endpoint". LiteLLM accepts the OpenAI chat-completions schema at
  # `${OPENAI_BASE_URL}/v1/chat/completions`.
  #
  # Default: Opus 4.7 — the highest-quality model in our mesh, per the
  # quality-first selection criterion. Opus quota was previously hitting
  # 429s in us-east5 (saturated by Claude Code's parallel usage on
  # i-for-AI) and in europe-west1 (sales-managed regional cap of 0).
  # Both fixed by switching the LiteLLM `vertex_location` to `global`
  # — i-for-AI has a 24M tokens/min global Opus quota at <1% utilization.
  #
  # Once the multi-LLM mesh (P3) ships per-class routing tags, ~80% of
  # traffic (chatter, memory curation, routine sub-agent dispatch) will
  # route to Sonnet 4.6 automatically while Opus stays the default for
  # `class:reasoning` / `class:headline`. Until then, all traffic gets
  # the highest-quality model.
  default: "vertex_ai/claude-opus-4-7"
  provider: "custom"
  base_url: "http://litellm-proxy:4000"
  # api_key is read from the OPENAI_API_KEY env var (set by
  # secrets/hermes-provider.env at bootstrap, sourced from the LiteLLM
  # master key so requests are authenticated against the proxy).

memory:
  enabled: true
  # Activate hermes-agent's bundled Honcho provider (plugins/memory/honcho).
  # HonchoClientConfig.from_env() reads HONCHO_API_KEY (+ optional
  # HONCHO_BASE_URL / HONCHO_TIMEOUT / HONCHO_ENVIRONMENT) from the
  # container env — injected via deploy/docker-compose.yml `env_file:
  # ../secrets/honcho.env`. Hosted endpoint (api.honcho.dev) by default.
  # See issue #54 for the wiring rationale.
  provider: honcho
  data_dir: /data
  curator_cron: "0 */6 * * *"

skills:
  enabled: true
  skills_dir: /app/skills
  extractor:
    min_turns: 10
    min_distinct_tools: 3

session:
  storage: sqlite
  sqlite_path: /data/sessions.db
  fts5_enabled: true

# Note: the previous top-level `honcho:` block was vestigial. The bundled
# hermes-agent plugin (plugins/memory/honcho) reads its config from env
# vars via HonchoClientConfig.from_env(), NOT from this YAML file. See
# `memory.provider: honcho` above and `../secrets/honcho.env` for activation.

vector_memory:
  enabled: true
  provider: chroma
  # Cloud-hosted (was http://chroma:8000 self-hosted). Connection details
  # come from secrets/chroma-cloud.env.sops:
  #   CHROMA_CLOUD_API_KEY, CHROMA_CLOUD_HOST, CHROMA_CLOUD_TENANT, CHROMA_CLOUD_DATABASE
  # The hermes-agent reads these env vars at startup.
  chroma_host: ${CHROMA_CLOUD_HOST}
  chroma_port: 443
  chroma_ssl: true
  chroma_headers:
    x-chroma-token: ${CHROMA_CLOUD_API_KEY}
  chroma_tenant: ${CHROMA_CLOUD_TENANT}
  chroma_database: ${CHROMA_CLOUD_DATABASE}
  collection: hermes_memory

mcp_servers:
  github:
    # Sidecar HTTP MCP service (deploy/docker-compose.yml `github-mcp`).
    # Runs ghcr.io/github/github-mcp-server in HTTP mode on port 8003,
    # authenticated via the GITHUB_PERSONAL_ACCESS_TOKEN sops-encrypted
    # secret. All toolsets enabled (--toolsets all): repos, pull_requests,
    # issues, actions, code_security, dependabot, secret_protection, etc.
    type: http
    url: http://github-mcp:8003
  context7:
    type: http
    url: https://mcp.context7.com/sse
  # playwright: deferred from Phase 1 — see compose-level note for details.

terminal_backend: docker
docker_backend:
  container: shell-sandbox
  workspace_path: /workspace

telemetry:
  otel_endpoint: http://otel-collector:4317
  service_name: hermes-agent
  service_version: 0.1.0

approval:
  config_path: /app/config/limits.yaml  # reads `approval` section from limits

logs:
  format: json
  level: INFO
  destination: stdout

# Phase 1 plugin allow-list (audit final-sweep P0-α resolution).
#
# Hermes' PluginManager is opt-in by default — standalone plugins discovered
# under ~/.hermes/plugins/<name>/ ONLY load when their name appears here
# (see hermes_cli/plugins.py:826-905). Each entry corresponds to a lib/<name>
# module mounted into the container via deploy/docker-compose.yml.
plugins:
  enabled:
    - anchors        # P1-1 TaskSpec + clarification loop
    - evaluators     # P1-2 multi-judge panel
    - durability     # P1-3/4/6 checkpointing + REJECTED-inject + retry
    - memory         # P1-4 /forget + /rejections slash commands
    - kanban         # P1-5 Kanban -> Telegram bridge
    - observability  # OTel SDK init + turn.start/tool.dispatch/model.call spans (Phase 1 acceptance step 4)
    - disk-cleanup   # P2-7 session hygiene — bundled hermes-agent/plugins/disk-cleanup; post_tool_call + on_session_end hooks auto-clean ephemeral test/temp files under HERMES_HOME (audit P2-7)

# Overrides default 4 AM daily reset to preserve context for long-running autonomous goals.
session_reset:
  mode: none
