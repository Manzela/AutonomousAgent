# Routing rules: tool name pattern → sandbox tier.
# Tiers (in order of permissiveness):
#   in_process       — runs in agent process (read-only, host FS)
#   shell_sandbox    — Docker container, no network, restricted FS
#   browser_sandbox  — Playwright container, network allowlisted per call
#   external_https   — outbound HTTPS to allowlisted MCPs
#   cloud_sandbox    — Modal/Daytona ephemeral microVM (Phase 2 onward)
#
# First match wins. Unknown tools fall through to `default_tier`.
#
# evaluate_after (P1-2): controls whether the orchestrator hook dispatches
# the 4-judge evaluator panel after a tool call from this route.
#   false → read-only / pure-info routes; too cheap to be worth evaluating.
#   true  → mutating, side-effecting, dispatching, or arbitrary-code routes;
#           judge panel is worth the cost. When in doubt, prefer `true`
#           (orchestrator can opt out per-call later).

default_tier: shell_sandbox

routes:
  # in-process (safe reads)
  - match: ["read_file", "ls", "grep", "rg", "find_files", "glob"]
    tier: in_process
    evaluate_after: false
  # shell sandbox
  - match: ["shell", "bash", "git", "jq", "run_command"]
    tier: shell_sandbox
    evaluate_after: true
  # browser sandbox
  - match: ["browser_*", "playwright_*", "web_scrape", "screenshot"]
    tier: browser_sandbox
    evaluate_after: true
  # external HTTPS MCPs — split: context7 docs lookups are pure-read,
  # github_* is bundled-write (orchestrator can opt out per-call for
  # github_get_*/list_*/search_* via the per-tool override path).
  - match: ["context7_*"]
    tier: external_https
    evaluate_after: false   # pure documentation read; not worth a judge panel
  - match: ["github_*"]
    tier: external_https
    evaluate_after: true    # github_* bundles writes (create_pr, merge, comment); default-on, orchestrator opts out per-call for known reads
  # arbitrary code execution
  - match: ["run_python", "run_javascript", "exec_code", "code_interpreter"]
    tier: cloud_sandbox
    evaluate_after: true
