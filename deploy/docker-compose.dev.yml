# Dev overrides: exposes ports for inspection, enables writable config mounts.

services:
  hermes:
    volumes:
      - ../config/hermes:/app/config:rw  # writable in dev for live config edits

  litellm-proxy:
    ports:
      - "127.0.0.1:4000:4000"  # exposed for direct probing

  # chroma dev port-mapping removed (Phase 1 — using Chroma Cloud)

  # honcho dev port-mapping removed (Phase 1 — Honcho disabled)
