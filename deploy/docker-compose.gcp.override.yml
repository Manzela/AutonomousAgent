# deploy/docker-compose.gcp.override.yml
# GCP-specific overrides loaded alongside docker-compose.yml on the VM:
#   docker compose -f docker-compose.yml -f docker-compose.gcp.override.yml up -d
#
# Adds gcplogs log driver to every service and binds hermes-data volume
# to /opt/hermes/data on the host (the mounted persistent disk).

x-gcplogs: &gcplogs
  driver: gcplogs
  options:
    gcp-log-cmd: "true"

services:
  # Image overrides: point custom images to Artifact Registry (not Docker Hub).
  # Public images (litellm, otel, phoenix, etc.) are left as-is — pulled directly.
  hermes:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/hermes:0.1.0
    logging: *gcplogs
  shell-sandbox:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/shell-sandbox:0.1.0
    logging: *gcplogs
  litellm-db:
    logging: *gcplogs
  litellm-proxy:
    logging: *gcplogs
  otel-collector:
    logging: *gcplogs
  phoenix:
    logging: *gcplogs
  github-mcp:
    logging: *gcplogs
  volume-init:
    logging: *gcplogs
  escalation-watcher:
    logging: *gcplogs
  snapshot-watchdog:
    logging: *gcplogs
  budget-watchdog:
    logging: *gcplogs

volumes:
  hermes-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/hermes/data
