# deploy/docker-compose.gcp.override.yml
# GCP-specific overrides loaded alongside docker-compose.yml on the VM:
#   docker compose -f docker-compose.yml -f docker-compose.gcp.override.yml up -d
#
# Adds gcplogs log driver to every service and binds hermes-data volume
# to /opt/hermes/data on the host (the mounted persistent disk).

x-gcplogs: &gcplogs
  driver: gcplogs
  options:
    gcp-log-cmd: "true"

services:
  # Image overrides: point custom images to Artifact Registry (not Docker Hub).
  # All four hermes-based services share the same AR image; public images left as-is.
  hermes:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/hermes:0.1.0
    logging: *gcplogs
  escalation-watcher:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/hermes:0.1.0
    logging: *gcplogs
  snapshot-watchdog:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/hermes:0.1.0
    logging: *gcplogs
  budget-watchdog:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/hermes:0.1.0
    logging: *gcplogs
  shell-sandbox:
    image: us-central1-docker.pkg.dev/i-for-ai/autonomousagent-images/shell-sandbox:0.1.0
    logging: *gcplogs
  # Use prod otel config (not dev) on GCP; path resolves to /opt/hermes/bootstrap/otel/
  otel-collector:
    volumes:
      - ./otel/collector.prod.yaml:/etc/otelcol-contrib/config.yaml:ro
    logging: *gcplogs
  litellm-db:
    logging: *gcplogs
  litellm-proxy:
    # Override bind mount paths: on VM everything lives under /opt/hermes/bootstrap/.
    # ../lib and ../config don't exist; redirect to ./lib and ./config in bootstrap dir.
    # Remove ${HOME}/.config/gcloud: on GCE the service account uses metadata-server ADC.
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ./lib/scrubber_callback.py:/app/scrubber_callback.py:ro
      - ./lib:/app/lib:ro
      - ./config/scrubber-patterns.yaml:/app/scrubber-patterns.yaml:ro
    logging: *gcplogs
  phoenix:
    logging: *gcplogs
  github-mcp:
    logging: *gcplogs
  volume-init:
    logging: *gcplogs

volumes:
  hermes-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /opt/hermes/data
