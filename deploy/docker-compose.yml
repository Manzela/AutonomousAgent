name: autonomous-agent

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &json_logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

networks:
  internal:
    driver: bridge
    internal: true
  egress:
    driver: bridge

volumes:
  hermes-data:
  chroma-data:
  # honcho-db-data: removed (Phase 1 — Honcho disabled)
  workspace:

services:

  # ---- Storage layer ----
  #
  # NOTE: honcho-db service removed for Phase 1. Honcho integration is
  # disabled in cli-config.yaml because upstream Honcho doesn't publish a
  # public Docker image. To re-enable: build Honcho's Dockerfile from source,
  # restore both this service and the `honcho` service below, and flip
  # `honcho.enabled: true` in config/hermes/cli-config.yaml.
  #
  # The encrypted secret `secrets/honcho-db-password.sops` is preserved
  # for the future re-enable; it's gitignored from runtime when not used.

  chroma:
    # Pinned (was :latest) — Chroma's slim image rotates quickly and
    # `latest` shipped a build whose API surface and bundled tools we
    # cannot fully predict.
    image: chromadb/chroma:0.5.20
    <<: [*restart_policy, *json_logging]
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: chromadb.auth.token_authn.TokenAuthenticationServerProvider
      CHROMA_SERVER_AUTHN_CREDENTIALS_FILE: /run/secrets/chroma_token
      CHROMA_SERVER_AUTHN_CREDENTIALS_PROVIDER: chromadb.auth.token_authn.TokenConfigServerAuthCredentialsProvider
    secrets:
      - chroma_token
    volumes:
      - chroma-data:/chroma/chroma
    networks: [internal]
    # The chroma image does NOT ship curl — use python's stdlib (always present).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:8000/api/v2/heartbeat',timeout=3); sys.exit(0 if r.status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Honcho (disabled in Phase 1; see note at honcho-db removal above) ----

  # ---- LiteLLM proxy ----

  litellm-proxy:
    # Pinned (was main-latest) — recent main builds require a Postgres
    # database for prisma-managed spend tracking and fail to start without
    # DATABASE_URL. v1.50.0 is the last release before that requirement
    # became mandatory; for our single-tenant use case we don't need
    # spend persistence beyond OTel.
    image: ghcr.io/berriai/litellm:v1.50.0-stable
    <<: [*restart_policy, *json_logging]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_master_key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      GOOGLE_APPLICATION_CREDENTIALS: /root/.config/gcloud/application_default_credentials.json
      # Tell prisma to skip migrations entirely (no DB)
      DISABLE_SCHEMA_UPDATE: "True"
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
    secrets:
      - litellm_master_key
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    networks: [internal, egress]
    depends_on:
      otel-collector: {condition: service_started}
    # litellm v1.50 ships with curl present.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/health/liveliness"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- OTel collector ----

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    <<: [*restart_policy, *json_logging]
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./otel/collector.dev.yaml:/etc/otelcol-contrib/config.yaml:ro
    networks: [internal, egress]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:13133/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Sandboxes ----

  shell-sandbox:
    build:
      context: ./sandboxes
      dockerfile: Dockerfile.shell-sandbox
    image: autonomousagent/shell-sandbox:0.1.0
    <<: [*restart_policy, *json_logging]
    network_mode: none
    cap_drop: [ALL]
    read_only: true
    tmpfs:
      - /tmp:size=100M
    volumes:
      - workspace:/workspace
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    command: ["sleep", "infinity"]

  playwright-mcp:
    image: mcr.microsoft.com/playwright/mcp:latest
    <<: [*restart_policy, *json_logging]
    networks: [internal, egress]
    mem_limit: 2g
    cpus: 2.0

  # ---- Hermes core ----

  hermes-agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.hermes
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    command: ["serve", "--port", "7878"]
    environment:
      HERMES_CONFIG: /app/config/cli-config.yaml
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_master_key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: hermes-agent
    secrets:
      - litellm_master_key
    volumes:
      - hermes-data:/data
      - ../config/hermes:/app/config:ro
      - ../config/limits.yaml:/app/config/limits.yaml:ro
      - ../config/scrubber-patterns.yaml:/app/config/scrubber-patterns.yaml:ro
      - ../config/toolsets.yaml:/app/config/toolsets.yaml:ro
    networks: [internal]
    depends_on:
      litellm-proxy: {condition: service_healthy}
      chroma: {condition: service_healthy}
      otel-collector: {condition: service_started}
      shell-sandbox: {condition: service_started}
      # honcho: removed (Phase 1 — see compose-level note above)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:7878/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  hermes-gateway:
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    command: ["gateway", "start"]
    environment:
      HERMES_CONFIG: /app/config/cli-config.yaml
      HERMES_AGENT_URL: http://hermes-agent:7878
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: hermes-gateway
    env_file:
      - ../secrets/telegram.env  # decrypted at bootstrap
    volumes:
      - hermes-data:/data:ro
      - ../config/hermes:/app/config:ro
    networks: [internal, egress]
    depends_on:
      hermes-agent: {condition: service_healthy}

secrets:
  # honcho_db_password: removed (Phase 1 — Honcho disabled, see note above)
  litellm_master_key:
    file: ../secrets/litellm-master-key
  chroma_token:
    file: ../secrets/chroma-token
