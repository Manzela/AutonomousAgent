name: autonomous-agent

x-restart: &restart_policy
  restart: unless-stopped

x-logging: &json_logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

networks:
  internal:
    driver: bridge
    internal: true
  egress:
    driver: bridge

volumes:
  hermes-data:
  # chroma-data: removed (Phase 1 — using Chroma Cloud instead of self-hosted)
  # honcho-db-data: removed (Phase 1 — Honcho disabled)
  litellm-db-data:   # Phase 1.1 — spend-tracking DB for LiteLLM proxy (issue #55)
  workspace:
  phoenix-data:

services:

  # ---- Storage layer ----
  #
  # NOTE: honcho-db service removed for Phase 1. Honcho integration is
  # disabled in cli-config.yaml because upstream Honcho doesn't publish a
  # public Docker image. To re-enable: build Honcho's Dockerfile from source,
  # restore both this service and the `honcho` service below, and flip
  # `honcho.enabled: true` in config/hermes/cli-config.yaml.
  #
  # The encrypted secret `secrets/honcho-db-password.sops` is preserved
  # for the future re-enable; it's gitignored from runtime when not used.

  # ---- Chroma (cloud-managed in Phase 1) ----
  #
  # The previous self-hosted `chroma` service was removed in favor of
  # Chroma Cloud (api.trychroma.com). Reasons:
  #   - One less service to operate / health-check
  #   - Chroma's recent `latest` image churn was a constant source of
  #     drift (auth API renames, dropped curl in slim base, etc.)
  #   - Chroma Cloud provides snapshots + replication out of the box
  #
  # The connection details are passed to hermes-agent via
  # `secrets/chroma-cloud.env.sops` (decrypted at bootstrap):
  #   CHROMA_CLOUD_API_KEY  — bearer token
  #   CHROMA_CLOUD_HOST     — api.trychroma.com
  #   CHROMA_CLOUD_TENANT   — default_tenant
  #   CHROMA_CLOUD_DATABASE — default_database

  # ---- Honcho (disabled in Phase 1; see note at honcho-db removal above) ----

  # ---- LiteLLM spend-tracking DB ----
  #
  # Phase 1.1 (issue #55): LiteLLM proxy needs a Postgres backend for its
  # spend-tracking endpoints (`/global/spend/report`, `/spend/logs`) and
  # the prisma-managed user/key tables to function. Without a DB, the
  # proxy returns 405/500 on those endpoints and the daily-cap historical
  # reporting is broken (per-request cap still works in-memory).
  #
  # Topology: postgres 16-alpine, internal network only (no egress; the
  # proxy is the sole client). Named volume `litellm-db-data` survives
  # restarts. Credentials sourced from sops-encrypted
  # `secrets/litellm-db.env` (POSTGRES_USER/PASSWORD/DB +
  # LITELLM_SALT_KEY + DATABASE_URL — same env file is consumed by
  # litellm-proxy below for DATABASE_URL/LITELLM_SALT_KEY).
  litellm-db:
    # Pinned by digest. Resolved 2026-05-19 via
    # `docker pull postgres:16-alpine`. 16-alpine is the smallest current
    # postgres LTS image and matches what LiteLLM's docs reference for
    # the proxy.
    image: postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    <<: [*restart_policy, *json_logging]
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, FOWNER, DAC_OVERRIDE]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    env_file:
      - ${SECRETS_DIR:-../secrets}/litellm-db.env   # POSTGRES_USER / POSTGRES_PASSWORD / POSTGRES_DB
    volumes:
      - litellm-db-data:/var/lib/postgresql/data
    networks: [internal]            # proxy reaches it via service-name DNS, no egress
    healthcheck:
      # pg_isready ships in the postgres image; checks the socket is accepting
      # connections AND that the named DB exists.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Langfuse (Phase 1.8) ----
  langfuse:
    image: ghcr.io/langfuse/langfuse:3
    ports:
      - "3000:3000"
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://litellm:postgres@litellm-db:5432/litellm_db
      - NEXTAUTH_SECRET=local_langfuse_secret_do_not_use_in_prod
      - SALT=local_langfuse_salt_do_not_use_in_prod
      - NEXTAUTH_URL=http://localhost:3000
      - TELEMETRY_ENABLED=false
    depends_on:
      litellm-db: {condition: service_healthy}
    networks:
      - internal

  # ---- LiteLLM proxy ----

  litellm-proxy:
    # Tag + digest pin. v1.84.0 is the most recent non-prerelease
    # tag on the BerriAI/litellm GHCR registry as of 2026-05-15; digest
    # captured 2026-05-19 for reproducibility.
    #
    # Phase 1.1 (issue #55): DB now attached for spend tracking. Prisma
    # runs schema migrations on first startup (DISABLE_SCHEMA_UPDATE was
    # previously set to True to skip them; removed so the spend_logs +
    # user/key tables actually get created). STORE_MODEL_IN_DB stays
    # False — our model_list is the source of truth in config.yaml, not
    # the DB-backed admin UI.
    image: ghcr.io/berriai/litellm:v1.84.0@sha256:29252f25ed1b538d44f6b76ec97412c5537a180b39ede744b9f3e86ffdd278f5
    <<: [*restart_policy, *json_logging]
    # HIGH-6: capability hardening. read_only: true is intentionally omitted
    # because Prisma writes migration files to /app/.prisma at startup — making
    # the root FS immutable requires additional tmpfs mounts not yet mapped.
    # cap_drop + no-new-privileges closes the privilege-escalation vector.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    entrypoint: ["sh", "-c", "test -s /secrets/sa-key.json || exit 1; exec docker/prod_entrypoint.sh \"$$@\"", "--"]
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_master_key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
      # Models live in config.yaml; don't shadow them with a DB-managed list.
      STORE_MODEL_IN_DB: "False"
      LITELLM_LOCAL_MODEL_COST_MAP: "True"
      LITELLM_NO_TELEMETRY: "True"
    env_file:
      # DATABASE_URL (consumed by general_settings.database_url via
      # os.environ/DATABASE_URL) and LITELLM_SALT_KEY (required when DB
      # is on; encrypts any model credentials prisma would write). The
      # same file is mounted on litellm-db above as the Postgres-init source.
      - ${SECRETS_DIR:-../secrets}/litellm-db.env
      # Wave-4 #35: OPENROUTER_API_KEY for fallback providers. File is
      # OPTIONAL — Compose treats a missing env_file as fatal, so this
      # entry has `required: false` so the stack still boots when the
      # operator has not yet provisioned the OpenRouter secret. Without
      # the key, any call routed to an openrouter/* model will 401
      # immediately (fail-loud, NOT silent). Provision via:
      #   sops decrypt secrets/openrouter.env.sops > secrets/openrouter.env
      # See docs/runbooks/openrouter-fallback.md.
      - path: ${SECRETS_DIR:-../secrets}/openrouter.env
        required: false
    secrets:
      - litellm_master_key
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
      - ${SECRETS_DIR:-../secrets}/sa-keys/litellm-proxy.json:/secrets/sa-key.json:ro
      # Audit C1: wire lib/scrubber.py as a LiteLLM CustomLogger so prompts
      # and responses are scanned for secrets before they reach OTel/Phoenix.
      # `scrubber_callback.py` must sit next to config.yaml (same directory
      # is what `get_instance_fn` resolves), and the wrapper imports
      # `lib.scrubber`, so we mount both:
      - ../lib/scrubber_callback.py:/app/scrubber_callback.py:ro
      - ../lib:/app/lib:ro
      - ../config/scrubber-patterns.yaml:/app/scrubber-patterns.yaml:ro
      # Redaction events land here so they survive container restarts +
      # are visible alongside Hermes' own /data writes.
      - hermes-data:/data
    networks: [internal, egress]
    depends_on:
      otel-collector: {condition: service_started}
      litellm-db: {condition: service_healthy}
    # litellm v1.84 image does NOT ship curl; use the bundled venv python.
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request,sys; r=urllib.request.urlopen('http://localhost:4000/health/liveliness',timeout=3); sys.exit(0 if r.status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ---- OTel collector ----

  otel-collector:
    # Pinned by digest. Resolved 2026-05-19. Re-pin via:
    # `docker pull otel/opentelemetry-collector-contrib:latest | grep Digest`
    image: otel/opentelemetry-collector-contrib@sha256:f41d7995565df3733b7568702073a9c490792f9c6ac60684fe6a4da21a313f8d
    <<: [*restart_policy, *json_logging]
    command: ["--config", "/etc/otelcol-contrib/config.yaml"]
    # HIGH-7: capability hardening — the collector receives all traces (full
    # prompt/response content) so a container escape is high-value.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    volumes:
      # P2-11: default is prod YAML so any `docker compose up` (smoke, panic,
      # snapshot scripts) routes telemetry through the production pipeline.
      # Override for local dev: OTEL_CONFIG=./otel/collector.dev.yaml docker compose up
      - ${OTEL_CONFIG:-./otel/collector.prod.yaml}:/etc/otelcol-contrib/config.yaml:ro
    networks: [internal, egress]
    # Resource limits.
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    # Healthcheck via the health extension (port 13133).
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    # The opentelemetry-collector-contrib distroless image ships no probe
    # binaries (no wget, curl, sh, nc, python). With nothing to exec, the
    # only signal we have is the container's own restart-on-failure policy
    # and its OTLP receiver behavior visible to upstream services.

  # ---- Phoenix observability UI ----
  #
  # Phoenix receives OTel traces from the collector and provides a web UI
  # for browsing LLM calls, tool invocations, and latency. Port 6006 serves
  # the UI and also acts as an OTLP HTTP receiver (/v1/traces). Port 4317
  # is the OTLP gRPC receiver (currently unused; collector routes to 6006
  # HTTP). Both ports are published for Phase 1 acceptance (step 4 requires
  # the human to open localhost:6006 in a browser).

  phoenix:
    # Pinned by digest. Resolved 2026-05-19.
    image: arizephoenix/phoenix@sha256:732f178b4fa1c4b9719f66a717be9f99970c84f30d61f92c4c63cf65bffce489
    <<: [*restart_policy, *json_logging]
    # P2-12: Phoenix UI has no built-in auth. Ports are loopback-only, but any
    # operator who port-forwards localhost:6006 during incident triage exposes
    # the full LLM trace history (including prompts and tool outputs) with zero
    # authentication to their local machine. Enable Phoenix auth before
    # port-forwarding to untrusted networks. Required env vars when auth is on:
    #   PHOENIX_ENABLE_AUTH=true
    #   PHOENIX_SECRET=<long random string: openssl rand -hex 32>
    #   PHOENIX_ADMIN_SECRET=<admin password>
    # See https://docs.arize.com/phoenix/deployment/security
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    environment:
      PHOENIX_ENABLE_AUTH: "${PHOENIX_ENABLE_AUTH:-false}"
      PHOENIX_SECRET: "${PHOENIX_SECRET:-local_phoenix_secret_do_not_use_in_prod1}"
    ports:
      - "127.0.0.1:4317:4317"   # OTLP gRPC receiver
      - "127.0.0.1:6006:6006"   # Phoenix UI + OTLP HTTP receiver
    volumes:
      - phoenix-data:/mnt/data
    # egress only to satisfy Docker port-publishing constraint (internal: true networks block published ports), not for Phoenix runtime traffic
    networks: [internal, egress]
    # Resource limits.
    mem_limit: 2g
    cpus: 1.0
    pids_limit: 200
    # Healthcheck via the Phoenix /healthz endpoint.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:6006/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ---- Sandboxes ----

  shell-sandbox:
    build:
      context: ./sandboxes
      dockerfile: Dockerfile.shell-sandbox
    image: autonomousagent/shell-sandbox:0.1.0
    <<: [*restart_policy, *json_logging]
    network_mode: none
    cap_drop: [ALL]
    # LOW-1: prevent setuid escalation from any Debian base-image binaries.
    # SB-4: seccomp profile enforces syscall allowlist (deny-by-default).
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp:sandboxes/seccomp-sandbox.json
    read_only: true
    tmpfs:
      - /tmp:size=100M
    volumes:
      - workspace:/workspace
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 200
    command: ["sleep", "infinity"]

  # ---- GitHub MCP (sidecar HTTP mode) ----
  #
  # Official server image from github/github-mcp-server. Hermes connects
  # via HTTP MCP protocol (matches Context7 pattern, simpler than stdio).
  # Toolset = `all`: actions, code_security, copilot, dependabot, discussions,
  # gists, git, issues, labels, notifications, orgs, projects, pull_requests,
  # repos, secret_protection, security_advisories, stargazers, users.
  # Required PAT scopes: repo, workflow, read:org, security_events.

  github-mcp:
    # Pinned by digest. Resolved 2026-05-19.
    image: ghcr.io/github/github-mcp-server@sha256:e3816a476a977cfb836e7d221510011436c654d11861db66ecfd826601aba6a4
    <<: [*restart_policy, *json_logging]
    command: ["http", "--port", "8003", "--toolsets", "all"]
    # HIGH-7: capability hardening for GitHub MCP (holds a live GitHub PAT).
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    environment:
      # PAT injected via env_file (decrypted at bootstrap from sops). The
      # github-mcp-server reads GITHUB_PERSONAL_ACCESS_TOKEN at startup
      # and uses it to authenticate every API call to api.github.com.
      GITHUB_PERSONAL_ACCESS_TOKEN_FILE: /run/secrets/github_pat
    secrets:
      - github_pat
    networks: [internal, egress]   # needs api.github.com egress
    # The official ghcr.io/github/github-mcp-server image is distroless —
    # no wget, curl, sh, python. Nothing to exec for a healthcheck. The
    # server logs "HTTP server listening addr=:8003" when ready; downstream
    # services (hermes) verify connectivity via 401 probes during startup.

  # ---- Playwright MCP (deferred from Phase 1) ----
  #
  # The mcr.microsoft.com/playwright/mcp:latest image's default entrypoint
  # exits cleanly when no client connects (it expects to be invoked with
  # specific MCP-server flags that we haven't researched). Disabled for
  # Phase 1; cli-config.yaml's `mcp_servers.playwright` entry is also
  # commented out. Will re-enable in a follow-up commit once the right
  # invocation is confirmed.

  # ---- Volume init (chown sidecar) ----
  #
  # Two intertwined problems landed in PR #60 (chore/security-hardening-v2):
  #
  #   1. Dockerfile.hermes added `USER hermes` (uid 1000) AND
  #      `useradd --create-home hermes` which puts HOME=/home/hermes. So
  #      `Path.home()` inside the container is /home/hermes — and Hermes
  #      hard-codes its state dir as `Path.home() / ".hermes"` (see
  #      hermes-agent/hermes_constants.py:hermes_home_dir). The compose
  #      file, however, still mounts the hermes-data volume + all config
  #      bind-mounts at the legacy `/root/.hermes` — that path is on a
  #      `/root` directory which is `0700 root:root` and unreachable to
  #      a non-root user. So Hermes silently writes Kanban/cron state to
  #      the ephemeral container fs at /home/hermes/.hermes and loses it
  #      on every restart.
  #
  #   2. Even if the mount path were correct, the hermes-data named
  #      volume is created on first stack-up by the Docker daemon as
  #      `0700 root:root` — that ownership PRE-DATES the Dockerfile's
  #      chown because named-volume mounts overlay the container fs
  #      AFTER the image's baked perms are laid down.
  #
  # Fix (this commit):
  #   - Move all `/root/.hermes` mounts to `/home/hermes/.hermes` so the
  #     compose mounts line up with where Hermes actually reads/writes.
  #   - Run this one-shot busybox container before hermes to chown the
  #     named volume + the host-mounted /data to uid:gid 1000:1000.
  #   - Replace the degenerate healthcheck (`python -c 'sys.exit(0)'`)
  #     with a filesystem-touching probe so any future regression of
  #     this class surfaces loudly instead of silently.
  #
  # Idempotent — runs at every stack-up, cheap. The escalation-watcher
  # sidecar also mounts hermes-data and depends on volume-init too.
  volume-init:
    # busybox 1.36 pinned by digest. Resolved 2026-05-19.
    image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
    command: ["sh", "-c", "chown -R 1000:1000 /data /hermes-home && echo 'volume-init: chowned /data + /hermes-home to 1000:1000'"]
    user: "0:0"           # explicit: must be root to chown
    restart: "no"         # one-shot
    volumes:
      - hermes-data:/data
      - hermes-data:/hermes-home
    # No network needed — purely a filesystem op.
    networks: []

  # ---- Hermes core ----
  #
  # The original spec called for two services (hermes-agent serving an HTTP
  # admin endpoint + hermes-gateway long-polling Telegram). Reality: hermes
  # has no `serve` subcommand. The gateway IS the agent — it long-polls
  # Telegram, dispatches each message through the agent loop, and persists
  # state to the shared volume. So we collapse to one service running
  # `hermes gateway run` (the foreground variant; `start` requires
  # systemd/launchd which isn't present in our distroless container).

  hermes:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.hermes
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    command: ["gateway", "run"]
    # A2A spike Day 2: expose the JSON-RPC receiver on 127.0.0.1:9001.
    # NOT wired into Hermes' gateway lifecycle yet — Day 2 operator manually
    # runs `uvicorn lib.a2a.server:app --host 0.0.0.0 --port 9001` inside
    # this container alongside the gateway. The port mapping below lets the
    # acceptance-gate curl from the host (localhost:9001) reach it.
    # Day 5 lands the auth middleware that makes this safe to expose more
    # broadly; until then the bind is loopback-only on the host side.
    ports:
      - "127.0.0.1:9001:9001"
    # Docker CIS 5.x baseline (P2 #20). Mirrors shell-sandbox's hardening:
    #   - cap_drop: [ALL]                  → drop every Linux capability
    #   - security_opt: no-new-privileges  → block setuid escalation
    #   - read_only: true                  → root fs immutable; writes only
    #     allowed through explicit volume mounts or tmpfs below
    # All hermes write paths are covered by named volumes:
    #   /data                       → hermes-data
    #   /home/hermes/.hermes        → hermes-data (state.db, sessions/,
    #                                 kanban/kanban.db, plugins/, .healthprobe)
    # Tmpfs covers everything else POSIX/Python tooling might touch:
    #   /tmp   (tempfile.mkstemp default, voice plugin if ever enabled, etc.)
    #   /run   (pidfiles, unix sockets if upstream Hermes ever needs them)
    # Logs go to stdout (cli-config.yaml `logs.destination: stdout`) so the
    # docker json-file driver captures them; no /var/log write needed.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-hermes.json
    read_only: true
    tmpfs:
      - /tmp:size=512m,mode=1777
      - /run:size=64m,mode=1777
    environment:
      HERMES_CONFIG: /app/config/cli-config.yaml
      LITELLM_MASTER_KEY_FILE: /run/secrets/litellm_master_key
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: hermes
      OTEL_SEMCONV_STABILITY_OPT_IN: gen_ai_latest_experimental
      # P-2: CloudSqlPgvectorStore DSN — Cloud SQL Auth Proxy on localhost.
      # IAM auth via the proxy; no password in the DSN.
      # Unset in dev/CI where InMemoryStore is used (the store is lazy-imported).
      CLOUD_SQL_DSN: ${CLOUD_SQL_DSN:-}
      # P-7: Redis-backed jti replay cache — Cloud Memorystore private IP.
      # Unset = L1-only fallback with WARNING. See redis jti design spec §7.
      REDIS_URL: ${REDIS_URL:-}
      # Auto-approve hooks/commands without a TTY (we're in Docker).
      HERMES_ACCEPT_HOOKS: "1"
      # Per-plugin discovery trace logging — enabled for the audit final-sweep
      # P0-α verification of our lib/* plugin loading. Can be turned off after
      # acceptance once we're confident discovery is stable.
      HERMES_PLUGINS_DEBUG: "1"
      # Our lib/* plugins (mounted under /home/hermes/.hermes/plugins/<name>/) each
      # declare top-line `from lib.X import Y` statements that reach into
      # sibling modules within lib/. The plugin's own __init__.py runs inside
      # Hermes' `hermes_plugins.<slug>` namespace, so the bare `lib.` import
      # only resolves if a real `lib/` package is on sys.path. Mount the same
      # ../lib that the escalation-watcher sidecar already mounts, and put
      # /app on PYTHONPATH so `lib.<submodule>` is importable.
      PYTHONPATH: /app
    env_file:
      - ${SECRETS_DIR:-../secrets}/telegram.env         # TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USERS
      - ${SECRETS_DIR:-../secrets}/chroma-cloud.env     # CHROMA_CLOUD_API_KEY/HOST/TENANT/DATABASE
      - ${SECRETS_DIR:-../secrets}/hermes-provider.env  # OPENAI_API_KEY, OPENAI_BASE_URL, HERMES_*_MODEL
      - ${SECRETS_DIR:-../secrets}/honcho.env           # HONCHO_API_KEY — hosted persistent memory (#54)
    secrets:
      - litellm_master_key
    # Egress: needs to reach Telegram (api.telegram.org), Chroma Cloud
    # (api.trychroma.com), GitHub MCP, Context7. Tool calls that route
    # to shell-sandbox stay on the internal network.
    networks: [internal, egress]
    volumes:
      - hermes-data:/data
      # Kanban SQLite DB persistence. Hermes writes the DB under
      # `Path.home() / ".hermes" / "kanban" / "kanban.db"` — which inside
      # this container resolves to /home/hermes/.hermes/kanban/kanban.db
      # because the security-hardening PR set HOME=/home/hermes (uid 1000
      # `hermes` user, not root). The escalation-watcher sidecar mounts
      # the same named volume at the same path; this mount makes the DB
      # visible to the hermes service itself so the agent can read/write it.
      # (The legacy /root/.hermes path is unreachable to non-root.)
      - hermes-data:/home/hermes/.hermes
      # Hermes reads its config from $HOME/.hermes/config.yaml exclusively
      # (the HERMES_CONFIG env var is for `hermes config edit`, not for
      # runtime resolution). Mount our cli-config.yaml directly there.
      - ../config/hermes/cli-config.yaml:/home/hermes/.hermes/config.yaml:ro
      - ../config/hermes/AGENTS.md:/home/hermes/.hermes/AGENTS.md:ro
      - ../config/hermes/MEMORY.md:/home/hermes/.hermes/MEMORY.md:ro
      - ../config/hermes/USER.md:/home/hermes/.hermes/USER.md:ro
      - ../config/hermes/SOUL.md:/home/hermes/.hermes/SOUL.md:ro
      # Canonical SDLC + security playbook for any new-repo creation work.
      # AGENTS.md instructs the agent to consult this BEFORE creating repos.
      - ../docs/conventions/new-repo-template.md:/home/hermes/.hermes/new-repo-template.md:ro
      # Our project's own runtime configs (limits/scrubber/toolsets) live
      # at /app/runtime/ — separate from Hermes' config namespace.
      - ../config/limits.yaml:/app/runtime/limits.yaml:ro
      - ../config/scrubber-patterns.yaml:/app/runtime/scrubber-patterns.yaml:ro
      - ../config/toolsets.yaml:/app/runtime/toolsets.yaml:ro
      # Phase 1 plugin mounts (per audit final-sweep P0-α resolution).
      # Each lib/<module> is mounted into the user-plugins scan path so
      # Hermes' PluginManager (hermes_cli/plugins.py:797-801) discovers
      # them. Each module has a plugin.yaml manifest + register(ctx)
      # entry point; activation is opt-in via plugins.enabled in
      # config/hermes/cli-config.yaml.
      - ../lib/anchors:/home/hermes/.hermes/plugins/anchors:ro
      - ../lib/evaluators:/home/hermes/.hermes/plugins/evaluators:ro
      - ../lib/durability:/home/hermes/.hermes/plugins/durability:ro
      - ../lib/memory:/home/hermes/.hermes/plugins/memory:ro
      - ../lib/kanban:/home/hermes/.hermes/plugins/kanban:ro
      # Observability: initializes the OTel SDK (env vars alone aren't enough,
      # Hermes ships an uninitialized ProxyTracerProvider by default) and emits
      # the app-level spans the Phase 1 acceptance runbook step 4 expects:
      # turn.start, tool.dispatch, model.call at service.name=hermes-agent.
      - ../lib/observability:/home/hermes/.hermes/plugins/observability:ro
      # A2A (Agent-to-Agent) protocol plugin — Day 1 scaffolding shell.
      # Spec-pinned to e997516 per audit/2026-05-21-a2a-spike-plan/SPEC-VERSION.md.
      # Feature-flag gated: NOT in plugins.enabled until Day 5 (auth land).
      - ../lib/a2a:/home/hermes/.hermes/plugins/a2a:ro
      # The plugins above declare `from lib.X import Y` for cross-module
      # imports inside their own __init__.py. Mount the full lib/ as a
      # PYTHONPATH-rooted package at /app/lib so those imports resolve.
      # (Mirrors the escalation-watcher sidecar's mount of the same path.)
      - ../lib:/app/lib:ro
    # Filesystem-touching probe: writes + unlinks a marker under
    # /home/hermes/.hermes (the same volume that owned the regression
    # caught in PR #60 review). The previous probe `python -c 'sys.exit(0)'`
    # was degenerate — it would have reported healthy even when hermes
    # (uid 1000) could not write to its own state directories. This probe
    # fails loudly the moment volume-overlay ownership drifts again.
    healthcheck:
      test:
        - CMD-SHELL
        - 'python -c "import os; p=''/home/hermes/.hermes/.healthprobe''; open(p, ''w'').close(); os.unlink(p)"'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Resource limits — prevent runaway agent from consuming all host resources.
    mem_limit: 8g
    cpus: 4.0
    pids_limit: 500
    depends_on:
      # Block on volume-init so /data + /home/hermes/.hermes are owned by
      # uid 1000 before hermes (uid 1000) tries to touch them. Compose v2.x
      # supports `service_completed_successfully` (we're on Compose v5).
      volume-init: {condition: service_completed_successfully}
      litellm-proxy: {condition: service_healthy}
      otel-collector: {condition: service_started}
      shell-sandbox: {condition: service_started}
      github-mcp: {condition: service_started}    # distroless image has no probe binaries
      # chroma: removed (Phase 1 — Chroma Cloud, no local service)
      # honcho: removed (Phase 1 — Honcho disabled, no public Docker image)
      # Cloud SQL Auth Proxy must be started before hermes starts so
      # CloudSqlPgvectorStore can connect to 127.0.0.1:5432.
      cloud-sql-proxy: {condition: service_started}

  # ---- Cloud SQL Auth Proxy  ----
  #
  # Runs as a sidecar that IAM-authenticates to Cloud SQL Postgres 16
  # (autonomousagent-postgres-vector) and proxies TCP on 127.0.0.1:5432.
  # The app connects to the proxy, not directly to Cloud SQL.
  # --auto-iam-authn injects a fresh OAuth token from the runtime metadata
  # server — no passwords stored anywhere.
  #
  # Design spec: docs/superpowers/specs/2026-05-25-cloud-sql-pgvector-store-design.md §4.C
  cloud-sql-proxy:
    # Google's official Cloud SQL Auth Proxy v2 image.
    # Pinned to 2.15.x — latest stable at time of writing.
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.15.0@sha256:b9dbf4aa34a514f0c38021686928a99f8d778925b2f330e46487cc708c0e61d2
    <<: [*restart_policy, *json_logging]
    container_name: autonomous-agent-cloud-sql-proxy-1
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    command:
      - --auto-iam-authn
      - --address=127.0.0.1
      - --port=5432
      - ${CLOUD_SQL_CONNECTION_NAME:-autonomous-agent-2026:us-central1:autonomousagent-postgres-vector}
    environment:
      # ADC chain — per-service SA key mount
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
    volumes:
      - ${SECRETS_DIR:-../secrets}/sa-keys/cloud-sql-proxy.json:/secrets/sa-key.json:ro
    networks: [internal]

  # ---- Escalation watcher ----
  #
  # Periodic 24h Telegram-silence watcher. Scans the Hermes Kanban DB for
  # cards stuck in `blocked` longer than `agent.telegram_escalation_timeout_h`
  # (default 24h) and emits F32 escalations. Reads limits.yaml on every
  # iteration so threshold/interval changes are hot-reloaded without a
  # sidecar restart. Sidecar by design — keeping it out of `hermes` proper
  # means a watcher crash never takes down the agent loop.

  escalation-watcher:
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    container_name: autonomous-agent-escalation-watcher-1
    # Override hermes-image ENTRYPOINT=["hermes"] so `command:` runs as a
    # plain python invocation. Without this, docker concatenates to
    # `hermes python /app/scripts/escalation_loop.py` and Hermes CLI rejects
    # "python" as a subcommand (CrashLoop pre-fix; introduced dde4533).
    entrypoint: []
    command: ["python", "/app/scripts/escalation_loop.py"]
    working_dir: /app
    # HIGH-5: capability hardening for sidecar services (mirrors hermes hardening).
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      PYTHONPATH: /app
      # Sidecars use sentinel file for halt signaling, not SIGTERM.
      HALT_ALERT_SENDS_SIGTERM: "false"
    volumes:
      - ../config/limits.yaml:/config/limits.yaml:ro
      - hermes-data:/home/hermes/.hermes
      - ../lib:/app/lib:ro
      - ../scripts:/app/scripts:ro
    networks: [internal, egress]   # egress for Telegram outbound
    depends_on:
      # Inherit volume-init via hermes; explicit too for clarity since this
      # service mounts hermes-data:/home/hermes/.hermes directly.
      volume-init: {condition: service_completed_successfully}
      hermes: {condition: service_started}
    # Resource limits.
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 100

  # GCS snapshot watchdog . Polls every interval_s; once per UTC
  # day after `snapshots.gcs_snapshot_cron` (hour-field only) tars
  # /home/hermes/.hermes and uploads to ${GCS_SNAPSHOT_BUCKET}. Behind a
  # feature flag — when GCS_SNAPSHOT_BUCKET is unset (the default until
  # the operator provisions the bucket per docs/runbooks/snapshots.md),
  # every tick is a no-op skip. Fail-soft: an upload failure emits a
  # Telegram nag but does not halt the agent.
  snapshot-watchdog:
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    container_name: autonomous-agent-snapshot-watchdog-1
    entrypoint: ["sh", "-c", "test -s /secrets/sa-key.json || exit 1; exec python /app/scripts/snapshot_loop.py"]
    command: []
    working_dir: /app
    # HIGH-5: capability hardening for sidecar services.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    tmpfs:
      - /tmp:size=256m,mode=1777   # tar staging for GCS snapshots
    environment:
      PYTHONPATH: /app
      # Feature flag. Empty string evaluates falsy in Python so run_once
      # short-circuits on the first line. Set in the operator's shell or
      # in a top-level .env file at the compose root.
      GCS_SNAPSHOT_BUCKET: ${GCS_SNAPSHOT_BUCKET:-}
      # Sidecars use sentinel file for halt signaling, not SIGTERM.
      HALT_ALERT_SENDS_SIGTERM: "false"
      # ADC chain. The mount below maps host gcloud config to a path the
      # google-cloud-storage Python client discovers automatically via ADC.
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
    env_file:
      - ${SECRETS_DIR:-../secrets}/telegram.env       # send_alert needs TELEGRAM_BOT_TOKEN
    volumes:
      - ../config/limits.yaml:/config/limits.yaml:ro
      - hermes-data:/home/hermes/.hermes       # tar source
      - ../lib:/app/lib:ro
      - ../scripts:/app/scripts:ro
      # Service Account key for GCS write access.
      - ${SECRETS_DIR:-../secrets}/sa-keys/snapshot-watchdog.json:/secrets/sa-key.json:ro
    networks: [internal, egress]   # egress for GCS API + Telegram
    depends_on:
      volume-init: {condition: service_completed_successfully}
      hermes: {condition: service_started}
    # Resource limits.
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 100
  # F21 daily budget watchdog . Polls LiteLLM_SpendLogs every
  # interval_s, alerts Telegram at alert_at_pct, dispatches F21 at 100%.
  # Direct Postgres because LiteLLM's /spend/total returns 404.
  # Needs `internal` for litellm-db reachability and `egress` for Telegram.
  budget-watchdog:
    image: autonomousagent/hermes:0.1.0
    <<: [*restart_policy, *json_logging]
    container_name: autonomous-agent-budget-watchdog-1
    entrypoint: []
    command: ["python", "/app/scripts/budget_watchdog_loop.py"]
    working_dir: /app
    # HIGH-5: capability hardening for sidecar services.
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
      - seccomp=sandboxes/seccomp-sidecar.json
    tmpfs:
      - /tmp:size=64m,mode=1777
    environment:
      PYTHONPATH: /app
      # Sidecars use sentinel file for halt signaling, not SIGTERM.
      HALT_ALERT_SENDS_SIGTERM: "false"
    env_file:
      - ${SECRETS_DIR:-../secrets}/telegram.env       # send_alert needs TELEGRAM_BOT_TOKEN
      - ${SECRETS_DIR:-../secrets}/litellm-db.env     # LITELLM_DB_URL / DATABASE_URL
    volumes:
      - ../config/limits.yaml:/config/limits.yaml:ro
      - hermes-data:/home/hermes/.hermes
      - ../lib:/app/lib:ro
      - ../scripts:/app/scripts:ro
    networks: [internal, egress]
    depends_on:
      volume-init: {condition: service_completed_successfully}
      litellm-db: {condition: service_healthy}
      hermes: {condition: service_started}
    # Resource limits.
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 100

secrets:
  # honcho_db_password: removed (Phase 1 — Honcho disabled)
  # chroma_token: removed (Phase 1 — using Chroma Cloud, key is in chroma-cloud.env)
  litellm_master_key:
    file: ${SECRETS_DIR:-../secrets}/litellm-master-key
  github_pat:
    file: ${SECRETS_DIR:-../secrets}/github-pat
