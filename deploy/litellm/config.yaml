model_list:
  - model_name: vertex_ai/claude-opus-4-7
    litellm_params:
      model: vertex_ai/claude-opus-4-7
      vertex_project: autonomous-agent-2026
      vertex_location: global   # Use the GLOBAL endpoint — org-wide quota pools across all regions for headroom.
      tags: ["tier:architect"]
      max_budget: 150
  - model_name: vertex_ai/claude-sonnet-4-6
    litellm_params:
      model: vertex_ai/claude-sonnet-4-6
      vertex_project: autonomous-agent-2026
      vertex_location: global   # Use the GLOBAL endpoint — org-wide quota pools across all regions for headroom.
  - model_name: vertex_ai/gemini-3.1-pro-preview
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: autonomous-agent-2026
      vertex_location: global   # Gemini 3.1 Pro Preview is only served via the global endpoint (verified 2026-05-15: us-central1 returns 404, global returns 200). 1M ctx, thinking model — judges using this axis must allow generous max_output_tokens.
      tags: ["tier:orchestrator", "tier:researcher"]
      max_budget: 200
  - model_name: vertex_ai/gemini-3-5-flash
    litellm_params:
      model: vertex_ai/gemini-3-5-flash
      vertex_project: autonomous-agent-2026
      vertex_location: us-central1
      tags: ["tier:fast-engineer"]
      max_budget: 50

  # ---- OpenRouter fallback providers (R3 single-provider risk) ----
  #
  # Wave-4 #35 (CICD-SEC-04 / R3 resilience): OpenRouter routes the same
  # model families via independent infrastructure (Anthropic + Google
  # native + multiple inference partners). When Vertex returns 5xx or
  # quota-exhaust, LiteLLM's router_settings.fallbacks block (below)
  # promotes the openrouter/* alias for the originating model.
  #
  # Auth: single OPENROUTER_API_KEY env var, sourced from sops-encrypted
  # `secrets/openrouter.env` (env_file in docker-compose.yml). If the
  # secret is absent, calls to the fallback alias fail-loud with 401;
  # operator must `sops decrypt secrets/openrouter.env.sops > secrets/openrouter.env`
  # before any fallback can fire (see docs/runbooks/openrouter-fallback.md).
  #
  # Model-ID stability: OpenRouter model slugs are part of their public
  # /api/v1/models contract and have been stable for >12 months for the
  # listed flagships. Verify against https://openrouter.ai/models before
  # adjusting; the runbook documents the verification curl.
  #
  # Capability step-down: primary aliases pin to the newest point-versions
  # (claude-opus-4-7, claude-sonnet-4-6, gemini-3.1-pro-preview); OpenRouter
  # exposes the nearest stable base-version (claude-opus-4, claude-sonnet-4,
  # gemini-2.5-pro). Expect a quality regression in fallback-served responses
  # — this is the intended trade-off for an outage-mitigation path.
  - model_name: openrouter/anthropic/claude-opus-4
    litellm_params:
      model: openrouter/anthropic/claude-opus-4
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
  - model_name: openrouter/anthropic/claude-sonnet-4
    litellm_params:
      model: openrouter/anthropic/claude-sonnet-4
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret
  - model_name: openrouter/google/gemini-2.5-pro
    litellm_params:
      model: openrouter/google/gemini-2.5-pro
      api_key: os.environ/OPENROUTER_API_KEY  # pragma: allowlist secret

  # ---- W1.J: Self-hosted Qwen3-Coder (privacy tier) ----
  #
  # Served by vLLM on a Spot A100 80GB instance (infra/qwen-vllm/).
  # LiteLLM prefix: `hosted_vllm/` — routes to the self-hosted OpenAI-compat
  # API. The api_base is the internal VPC IP of the qwen-vllm instance.
  # Decision: D-2.a (Qwen3-Coder-30B-A3B-Instruct), D-8 (spot pricing).
  - model_name: hosted_vllm/Qwen/Qwen3-Coder-30B-A3B-Instruct
    litellm_params:
      model: hosted_vllm/Qwen/Qwen3-Coder-30B-A3B-Instruct
      api_base: os.environ/QWEN_VLLM_API_BASE  # e.g. http://10.128.0.X:8000/v1
      tags: ["tier:privacy"]
      max_budget: 0  # self-hosted, no external API cost

litellm_settings:
  drop_params: true
  num_retries: 5
  request_timeout: 600
  telemetry: false  # we use OTel directly, not LiteLLM's anonymous telemetry
  cache: false
  set_verbose: false
  json_logs: true

  # Budget enforcement
  max_budget: 100  # USD per day, hard cap at the proxy layer
  budget_duration: 24h
  # CC-4: LiteLLM proxy budget alerts forwarded to the bot via env var.
  # Set LITELLM_BUDGET_ALERT_WEBHOOK to a Telegram webhook or Cloud Monitoring
  # ingest URL. Runtime budget enforcement runs at both proxy (this cap) and
  # the budget_watchdog loop (config/limits.yaml budget.daily_usd_cap: 500).
  alert_to_webhook_url: os.environ/LITELLM_BUDGET_ALERT_WEBHOOK

  # OTel for tracing; scrubber_callback.proxy_handler_instance redacts
  # secrets in prompts/responses BEFORE they reach OTel/Phoenix/disk.
  # Loader: litellm.proxy.types_utils.utils.get_instance_fn — splits on
  # the final dot, imports `scrubber_callback` from the same directory
  # as this config.yaml (/app/scrubber_callback.py), fetches
  # `proxy_handler_instance`. See lib/scrubber_callback.py for impl,
  # audit/phase1-to-phase2-readiness-2026-05-19/security-audit.md C1
  # for context.
  callbacks: ["otel", "scrubber_callback.proxy_handler_instance"]

# OpenTelemetry export
litellm_otel:
  endpoint: http://otel-collector:4318
  service_name: litellm-proxy

router_settings:
  # Wave-4 #35 (R3 mitigation): Vertex → OpenRouter fallback on retriable
  # errors (5xx, 408, 425, 429, 502, 503, 504, 529) AFTER the per-call
  # `litellm_settings.num_retries: 5` budget is exhausted. LiteLLM iterates
  # each fallback list left-to-right and re-issues the original request body
  # against the next model — there is no prompt translation because both
  # providers serve the same model weights.
  #
  # Each key MUST be a `model_name` from `model_list` above (NOT the raw
  # `litellm_params.model` value), and each fallback value MUST also be a
  # `model_name` from `model_list`. LiteLLM resolves the alias→provider
  # mapping internally. Operator runbook: docs/runbooks/openrouter-fallback.md.
  fallbacks:
    - vertex_ai/claude-opus-4-7: [openrouter/anthropic/claude-opus-4]
    - vertex_ai/claude-sonnet-4-6: [openrouter/anthropic/claude-sonnet-4]
    - vertex_ai/gemini-3.1-pro-preview: [openrouter/google/gemini-2.5-pro]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Phase 1.1 (issue #55): Postgres backend attached so spend-tracking
  # endpoints (`/global/spend/report`, `/spend/logs`) accumulate cost +
  # usage history. Connection string is injected from the sops-encrypted
  # `secrets/litellm-db.env` file (env_file in docker-compose.yml).
  # The `litellm-db` sidecar service is what `litellm-db:5432` resolves to.
  database_url: os.environ/DATABASE_URL
  # Note: `enforced_params` left out (presence triggers a Pro-only check
  # in LiteLLM v1.84+ even when the value is an empty list). STORE_MODEL_IN_DB
  # is still False — model_list above is the source of truth, not the
  # DB-backed admin UI. Prisma migrations DO run at startup (we removed
  # DISABLE_SCHEMA_UPDATE so the spend_logs/user_table get created).
