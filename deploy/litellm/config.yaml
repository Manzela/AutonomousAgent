model_list:
  - model_name: vertex_ai/claude-opus-4-7
    litellm_params:
      model: vertex_ai/claude-opus-4-7
      vertex_project: i-for-ai
      vertex_location: global   # Use the GLOBAL endpoint — i-for-AI has a 24M tokens/min Opus 4.7 global quota at 0.35% utilization. Per-region Opus quota in europe-west1 was 0 (sales-managed; not self-serve increasable). Global endpoint pools across all regions for headroom.
  - model_name: vertex_ai/claude-sonnet-4-6
    litellm_params:
      model: vertex_ai/claude-sonnet-4-6
      vertex_project: i-for-ai
      vertex_location: global   # Use the GLOBAL endpoint — i-for-AI has a 24M tokens/min Opus 4.7 global quota at 0.35% utilization. Per-region Opus quota in europe-west1 was 0 (sales-managed; not self-serve increasable). Global endpoint pools across all regions for headroom.
  - model_name: vertex_ai/gemini-3.1-pro-preview
    litellm_params:
      model: vertex_ai/gemini-3.1-pro-preview
      vertex_project: i-for-ai
      vertex_location: global   # Gemini 3.1 Pro Preview is only served via the global endpoint (verified 2026-05-15: us-central1 returns 404, global returns 200). 1M ctx, thinking model — judges using this axis must allow generous max_output_tokens.

litellm_settings:
  drop_params: true
  num_retries: 5
  request_timeout: 600
  telemetry: false  # we use OTel directly, not LiteLLM's anonymous telemetry
  cache: false
  set_verbose: false
  json_logs: true

  # Budget enforcement
  max_budget: 100  # USD per day, hard cap
  budget_duration: 24h
  alert_to_webhook_url: ""  # set after Phase 2 cloud monitoring is up

  # OTel for tracing; scrubber_callback.proxy_handler_instance redacts
  # secrets in prompts/responses BEFORE they reach OTel/Phoenix/disk.
  # Loader: litellm.proxy.types_utils.utils.get_instance_fn — splits on
  # the final dot, imports `scrubber_callback` from the same directory
  # as this config.yaml (/app/scrubber_callback.py), fetches
  # `proxy_handler_instance`. See lib/scrubber_callback.py for impl,
  # audit/phase1-to-phase2-readiness-2026-05-19/security-audit.md C1
  # for context.
  callbacks: ["otel", "scrubber_callback.proxy_handler_instance"]

# OpenTelemetry export
litellm_otel:
  endpoint: http://otel-collector:4317
  service_name: litellm-proxy

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  # Phase 1.1 (issue #55): Postgres backend attached so spend-tracking
  # endpoints (`/global/spend/report`, `/spend/logs`) accumulate cost +
  # usage history. Connection string is injected from the sops-encrypted
  # `secrets/litellm-db.env` file (env_file in docker-compose.yml).
  # The `litellm-db` sidecar service is what `litellm-db:5432` resolves to.
  database_url: os.environ/DATABASE_URL
  # Note: `enforced_params` left out (presence triggers a Pro-only check
  # in LiteLLM v1.84+ even when the value is an empty list). STORE_MODEL_IN_DB
  # is still False — model_list above is the source of truth, not the
  # DB-backed admin UI. Prisma migrations DO run at startup (we removed
  # DISABLE_SCHEMA_UPDATE so the spend_logs/user_table get created).
