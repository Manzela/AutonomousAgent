extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  memory_limiter:
    # Absolute MiB caps (not percentage) — prevents O-9: percentage-based
    # thresholds are unpredictable when the container has no hard mem_limit.
    # 400 MiB soft + 80 MiB spike headroom = 480 MiB total before OOM.
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 80
  resource:
    attributes:
      - key: deployment.environment
        value: prod
        action: upsert
  redaction:
    # Scrub PII from trace/log attributes and log bodies
    allow_all_keys: true
    # Even though allow_all_keys=true means allowed_keys is unused, keep these
    # for defence-in-depth (if a future contributor flips back to false).
    allowed_keys:
      - "http.*"
      - "os.*"
      - "process.*"
      - "host.*"
      - "gen_ai.system"
      - "gen_ai.request.model"
      - "gen_ai.response.model"
      - "error"
      - "error.type"
    blocked_key_patterns:
      - "(?i).*(email|ssn|phone|tenant_secret|api_key|bearer|customer_id|user_id|account_number).*"
    blocked_values:
      - "(?i)(password|secret|key|token|sk-[a-zA-Z0-9]{20,})"
      - "\\b\\d{3}-\\d{2}-\\d{4}\\b" # SSN
      - "\\b(?:[a-zA-Z0-9+_.-]+@[a-zA-Z0-9.-]+)\\b" # Email
  tail_sampling:
    decision_wait: 30s
    num_traces: 100000
    expected_new_traces_per_sec: 100
    policies:
      # Primary error policy: OTel span status explicitly set to ERROR.
      - name: errors
        type: status_code
        status_code: {status_codes: [ERROR]}
      # P3-7: Secondary error policy catches traces where the error is signalled
      # via a span attribute (error=true / error=1) rather than via the OTel
      # span status code — e.g., LiteLLM proxy spans that set the attribute but
      # don't call span.set_status(StatusCode.ERROR). Prevents the status_code
      # policy from silently dropping such traces.
      - name: error-attribute
        type: string_attribute
        string_attribute:
          key: error
          values: ["true", "1"]
          enabled_regex_matching: false
          cache_max_size: 1000
          invert_match: false
      - name: slow
        type: latency
        latency: {threshold_ms: 5000}
      - name: human-overrides
        type: string_attribute
        string_attribute:
          key: "gen_ai.human_override"
          values: ["true", "1"]
          enabled_regex_matching: false
      - name: probabilistic
        type: probabilistic
        probabilistic: {sampling_percentage: 10}

exporters:
  googlecloud:
    project: autonomous-agent-2026
    log:
      default_log_name: "opentelemetry.io/collector-exported-log"

# O-2: spanmetrics connector derives p50/p99 latency histograms from trace spans.
# These feed the metrics pipeline so SLO burn-rate alerts have histogram data.
connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [10ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 2500ms, 5000ms, 10000ms]
    dimensions:
      - name: deployment.environment
    exemplars:
      enabled: true
    metrics_flush_interval: 15s
    namespace: "autonomousagent"

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, redaction, tail_sampling, batch]
      # Export to Cloud Monitoring AND feed into spanmetrics connector.
      exporters: [googlecloud, spanmetrics]
    metrics:
      # Both native OTLP metrics AND spanmetrics-derived latency histograms.
      receivers: [otlp, spanmetrics]
      processors: [memory_limiter, resource, redaction, batch]
      exporters: [googlecloud]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, redaction, batch]
      exporters: [googlecloud]
