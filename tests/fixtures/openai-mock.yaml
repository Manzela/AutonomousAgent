openapi: 3.0.0
info:
  title: Mock OpenAI for tests
  version: 1.0.0
paths:
  /v1/chat/completions:
    post:
      responses:
        '200':
          content:
            application/json:
              example:
                id: chatcmpl-test
                object: chat.completion
                created: 0
                model: vertex_ai/claude-opus-4-7
                choices:
                  - index: 0
                    message:
                      role: assistant
                      content: "Mocked response: pong"
                    finish_reason: stop
                usage:
                  prompt_tokens: 10
                  completion_tokens: 5
                  total_tokens: 15
  /health/liveliness:
    get:
      responses:
        '200':
          content:
            application/json:
              example:
                status: healthy
  /v1/models:
    get:
      responses:
        '200':
          content:
            application/json:
              example:
                data:
                  - id: vertex_ai/claude-opus-4-7
